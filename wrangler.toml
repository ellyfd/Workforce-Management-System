name = "workforcemanagement"
main = "index.js"
compatibility_date = "2024-09-01"

# 前端網頁（index.html=全部排休、me.html=我的排休）由 Worker 一併服務。
# 靜態資源優先比對：對得上的路徑直接回檔案，對不上的（例如 /api/*）才進 index.js。
[assets]
directory = "./public"

[[d1_databases]]
binding = "DB"
database_name = "dpc-hub"
database_id = "33f69061-a17d-431d-8105-343cadd695dc"

# DPC 同步：每天台北早上 8 點自動跑（Cloudflare cron 用 UTC，台北 08:00 = UTC 00:00）。
# 出錯時可到設定管理頁按「立即同步」手動重跑。
[triggers]
crons = ["0 0 * * *"]

# 非機密設定（機密用 wrangler secret put 設定，勿寫在這裡）：
#   BASE44_API_KEY  從 Base44 讀資料用
#   SYNC_SECRET     手動觸發 /api/sync 的通關密語
[vars]
BASE44_API_URL = "https://app-67c8f9d9.base44.app/api"
BASE44_APP_ID = "693bb4665c3a400767c8f9d9"
DPC_DEPT_NAME = "DPC"
DPC_DISPLAY_NAME = "DPC"
