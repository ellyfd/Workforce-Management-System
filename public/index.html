<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>全部排休 · 開發處休假表</title>
<link rel="stylesheet" href="app.css" />
<style>
  :root {
    --border: #e5e7eb;
    --muted: #6b7280;
    --bg: #f9fafb;
    --weekend: #fef2f2;
    --holiday: #fef2f2;
    --today: #fef3c7;
    --name-w: 104px;
    --day-w: 44px;
    --row-h: 40px;
    --head-h: 46px;
    --blue: #2563eb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    color: #1f2937;
    background: var(--bg);
  }
  .page { padding: 12px; max-width: 100%; }
  header.top { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 6px; }
  header.top h1 { font-size: 20px; margin: 0; font-weight: 600; }
  header.top .sub { color: var(--muted); font-size:14px; }
  header.top .spacer { flex: 1; }
  header.top a.nav-link { font-size:14px; color: var(--blue); text-decoration: none; }
  header.top a.nav-link:hover { text-decoration: underline; }

  .toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
  .toolbar button {
    font: inherit; font-size: 14px; font-weight: 400; cursor: pointer; border-radius: 8px;
    border: 1px solid var(--border); background: #fff; padding: 6px 12px;
  }
  .toolbar button:hover { background: #f3f4f6; }
  .toolbar .month-label { font-weight: 600; min-width: 110px; text-align: center; }
  /* 頁首所有控制項（下拉、按鈕）統一字級與字重，與標籤/勾選看起來一致 */
  .toolbar select { font: inherit; font-size: 14px; font-weight: 400; cursor: pointer; border-radius: 8px; border: 1px solid var(--border); background: #fff; padding: 6px 8px; }
  .toolbar .today-btn { color: var(--blue); border-color: var(--blue); }

  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin: 8px 0 12px; align-items: center; }
  .helpbox { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; margin-top: 10px; }
  .helpbox summary { cursor: pointer; font-weight: 600; }
  .helpbox .legend { margin: 6px 0 2px; }
  .legend .item { display: inline-flex; align-items: center; gap: 5px; font-size:14px; color: #374151; }
  .legend .dot { width: 14px; height: 14px; border-radius: 4px; }
  .legend .note { color: var(--muted); font-size:14px; }
  /* 假別篩選 chip（桌機）：色票，選中填滿 */
  .tchip{ box-sizing:border-box; min-width:52px; text-align:center; border:1.5px solid var(--c,#cbd5e1); color:var(--c,#475569); background:#fff; border-radius:999px; padding:4px 9px; font-size:13px; font-weight:600; cursor:pointer; line-height:1.2; }
  .tchip.tall{ --c:#94a3b8; }
  .tchip:hover{ background:#f8fafc; }
  .tchip.on{ background:var(--c,#64748b); color:#fff; }
  /* 管理員專用標記 */
  .admin-badge{ display:inline-flex; align-items:center; gap:4px; background:#eff6ff; color:#2563eb; border:1px solid #bfdbfe; border-radius:999px; padding:2px 9px; font-size:12px; font-weight:600; }
  .admin-badge::before{ content:'🔒'; font-size:11px; }

  .scroll {
    overflow: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #fff;
    max-height: calc(100vh - 190px);
    overscroll-behavior: none;
    -webkit-overflow-scrolling: auto;
  }
  table { border-collapse: separate; border-spacing: 0; width: max-content; }
  th, td { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  thead th {
    position: sticky; top: 0; z-index: 20;
    background: var(--bg); height: var(--head-h);
    font-size:14px; color: #4b5563; font-weight: 500;
    text-align: center; padding: 0;
  }
  thead th.name { left: 0; z-index: 30; text-align: left; padding-left: 10px; min-width: var(--name-w); width: var(--name-w); }
  thead th.day { min-width: var(--day-w); width: var(--day-w); }
  thead th.day .wd { font-size:14px; color: var(--muted); font-weight: 400; }
  thead th.day.weekend { color: #ef4444; background: var(--weekend); }
  thead th.day.weekend .wd { color: #ef4444; }
  thead th.day.holiday { color: #ef4444; background: var(--holiday); }
  thead th.day.holiday .wd { color: #ef4444; }
  thead th.day.today { background: var(--today); }

  tbody td.name {
    position: sticky; left: 0; z-index: 10;
    background: #fff; min-width: var(--name-w); width: var(--name-w);
    height: var(--row-h); padding: 2px 10px; text-align: left;
    box-shadow: 2px 0 3px rgba(0,0,0,.04);
  }
  tbody td.name .n { font-size:14px; font-weight: 500; line-height: 1.15; }
  tbody td.name .c { font-size:14px; color: var(--muted); line-height: 1.1; }
  tbody td.day { min-width: var(--day-w); width: var(--day-w); height: var(--row-h); padding: 3px; text-align: center; }
  tbody td.day.weekend { background: var(--weekend); }
  tbody td.day.holiday { background: var(--holiday); }
  tbody td.day.today { background: var(--today); }
  tbody td.day[data-emp] { cursor: pointer; }
  tbody td.day.picking { outline: 2px solid var(--blue); outline-offset: -2px; }
  thead th.day.hl, tbody td.day.hl { background: #e0e7ff; }
  thead th.day.mstart, tbody td.day.mstart { border-left: 2px solid #c7d2fe; }
  thead th.day { cursor: default; }
  thead th.day .mtag { font-size:14px; color: var(--blue); font-weight: 600; line-height: 1; }
  tr.emprow.dragging { opacity: .45; }
  tr.emprow.dragover td.name { box-shadow: inset 0 3px 0 var(--blue), 2px 0 3px rgba(0,0,0,.04); }
  td.name .grip { cursor: grab; color: var(--muted); }

  tr.dept td {
    position: sticky; left: 0; z-index: 12;
    background: #f8fafc; color: #475569; font-weight: 600; font-size:14px;
    padding: 5px 10px; height: 28px; border-right: none;
  }
  /* 部門名稱固定在左側，橫向捲動時不隨欄位滑走 */
  tr.dept td .deptlabel { position: sticky; left: 10px; display: inline-block; }

  /* 假別色塊：整天填滿；半天只佔一半（早休＝上半、午休＝下半），格內字較小以塞進半格 */
  .chip {
    display: flex; align-items: center; justify-content: center;
    height: 100%; border-radius: 6px; font-size:12px; font-weight: 500; color: #fff;
    white-space: nowrap; overflow: hidden; letter-spacing: 0;
  }
  /* 半天用內層 .hw 做上下分槽，避免在 <td> 直接 display:flex
     （那會讓格子脫離表格列高模型，整列在 Safari 變高 → 對不齊）。 */
  td.day.half .hw { display: flex; flex-direction: column; gap: 1px; height: 100%; }
  td.day.half .chip { height: calc(50% - 1px); font-size:11px; line-height:1; padding:0; }
  td.day.half .chip.am { margin-bottom: auto; }
  td.day.half .chip.pm { margin-top: auto; }

  /* 本人列：黃底（同今天欄） */
  tr.merow td.name, tr.merow td.tot { background: #fef9c3; }
  tr.merow td.day:not(.weekend):not(.holiday):not(.today) { background: #fefce8; }

  /* 年度累計休假日（同 Excel：休=1、午休/早休=0.5） */
  thead th.tot, tbody td.tot {
    position: sticky; left: var(--name-w); z-index: 10;
    min-width: 52px; width: 52px; text-align: center;
    background: #fff; font-variant-numeric: tabular-nums;
  }
  thead th.tot { z-index: 30; background: var(--bg); }
  tbody td.tot { font-weight: 500; box-shadow: 2px 0 3px rgba(0,0,0,.04); }

  .status { padding: 24px; color: var(--muted); font-size: 14px; }
  .err { color: #b91c1c; }
  footer { color: var(--muted); font-size:14px; margin-top: 8px; }

  /* 平板/手機：表單控制項被全站樣式放大為 16px（避免 iOS 聚焦縮放），
     同步把頁首的標籤、按鈕、勾選也放大到 16px，整排字級才看起來一致。 */
  @media (max-width: 820px) {
    .toolbar button, .toolbar select, .toolbar .muted,
    .legend .muted, .legend .item, .legend label,
    .deptdrop .deptbtn, .deptmenu label { font-size: 16px; }
  }

  /* 手機：縮窄欄寬讓表格塞下更多日子，捲動區不被底部導覽列遮住 */
  @media (max-width: 560px) {
    :root { --name-w: 80px; --day-w: 32px; --row-h: 36px; --head-h: 42px; }
    .page { padding: 10px 8px 4px; }
    header.top h1 { font-size: 18px; }
    .scroll { max-height: calc(100dvh - 230px); }
    .chip { font-size: 11px; }
    thead th.tot, tbody td.tot { min-width: 40px; width: 40px; }
  }
</style>
</head>
<body class="has-shell">
<div class="page">
  <header class="top">
    <h1 id="title">全部排休</h1>
  </header>

  <div class="toolbar">
    <button id="prev">‹</button>
    <select id="selYear" class="ymsel" title="選擇年度"></select>
    <select id="selMonth" class="ymsel" title="選擇月份"></select>
    <button id="next">›</button>
    <button class="today-btn" id="todayBtn">今天</button>
    <button id="yearBtn">全年</button>
  </div>

  <div class="legend" id="deptbar"><span class="muted">部門：</span></div>
  <div class="legend" id="typebar"><span class="muted">只看假別：</span></div>

  <div class="toolbar admin-only">
    <span class="admin-badge">管理員專用 · 新增 / 修改休假</span>
    <span class="muted">假別：</span>
    <select id="ltype"><option value="">下拉選單</option></select>
    <button id="rangeBtn">區間</button>
    <span class="muted" id="editHint"></span>
  </div>

  <div class="scroll"><div id="status" class="status">載入中…</div><table id="table" style="display:none"></table></div>

  <details class="helpbox">
    <summary>操作說明與假別圖例</summary>
    <ul class="muted admin-only" style="margin:10px 0 4px;padding-left:18px;line-height:1.8;">
      <li>填入：選假別後點格子；取消：雙擊已填入的格子（半天點上半/下半）。</li>
      <li>區間：按「區間」後，點同一人列的起始日與結束日。</li>
    </ul>
    <ul class="muted" style="margin:10px 0 4px;padding-left:18px;line-height:1.8;">
      <li>「累計」＝年度累計休假日，依「休假設定」各假別的計入天數加總（例：休=1、午休/早休=0.5）。</li>
    </ul>
    <div style="font-weight:600;margin:8px 0 2px;">假別圖例</div>
    <div class="legend" id="legend"></div>
  </details>
  <footer id="footer"></footer>
</div>

<script src="app.js"></script>
<script>
/*
 * 開發處休假表 — 全部排休（月曆總表）
 * 資料來源：Cloudflare Worker API  GET /api/calendar?year&month
 * 由 Worker 本身一併服務本頁（同源）；亦可用 ?api=<Worker 網址> 覆蓋。
 */
const params = new URLSearchParams(location.search);
// 預設打部署好的 Worker；同源服務時這個絕對網址一樣會通，CORS 已開放。
const API_BASE = (params.get('api') || 'https://workforcemanagement.ellyfd.workers.dev').replace(/\/+$/, '');
// DPC 過渡資料：排程產生的 public/dpc.json，D1 尚無資料時暫時合併顯示。
const DPC_URL = params.get('dpc') || './dpc.json';

const WEEKDAY = ['日','一','二','三','四','五','六'];
const DEFAULT_COLORS = { '休':'#22c55e','差':'#ec4899','午休':'#a855f7','病':'#f97316','員旅':'#9ca3af','早休':'#3b82f6' };

// 目前顯示的年月（可由網址 ?year=&month= 指定）
let curYear = Number(params.get('year')) || new Date().getFullYear();
let curMonth = Number(params.get('month')) || (new Date().getMonth() + 1);

// 編輯狀態
let leaveTypes = [];
let EMP = {};              // empId -> { name, leaves }
let EMP_DEPT = {};         // empId -> 部門索引（拖曳限同部門）
let DEPT_MEMBERS = {};     // 部門索引 -> [empId 順序]
let dragEmp = null;
let HOLIDAYS = new Set();
let selType = '';          // 選的假別 id
let rangeMode = false, rangeEmp = null, rangeStart = null;
let editingInit = false;
let fullYear = false;       // 全年模式
let highlightDate = null;   // 雙擊日期欄高亮整欄
let DEPTSEL = new Set();    // 部門篩選(空=全部)
let typeFilter = '';        // 假別篩選：空=全部，否則為該假別 short_name
// 依假別篩選只保留符合的色塊（其餘格子留白）
function filterSlots(slots){
  if (!typeFilter || !slots) return slots;
  const keep = {};
  for (const k of ['full','am','pm']) if (slots[k] && slots[k].label === typeFilter) keep[k] = slots[k];
  return (keep.full || keep.am || keep.pm) ? keep : null;
}
// 篩選假別時，只保留「有這個假別」的人（像部門篩選一樣隱藏其他人）
function memberHasType(m){
  if (!typeFilter) return true;
  const lv = m.leaves || {};
  for (const date in lv){ const s = lv[date]; if (s && ((s.full && s.full.label===typeFilter) || (s.am && s.am.label===typeFilter) || (s.pm && s.pm.label===typeFilter))) return true; }
  return false;
}
let deptMenuOpen = false;   // 手機版部門下拉是否展開
const deptMobile = window.matchMedia('(max-width: 560px)'); // 手機才把部門篩選收成下拉
// 跨越手機/桌機斷點時重繪（部門篩選樣式不同）
deptMobile.addEventListener('change', () => { deptMenuOpen = false; if (LAST) render(LAST); });
// 點下拉外面就收起部門選單
document.addEventListener('click', (e) => {
  if (!deptMenuOpen) return;
  if (e.target.closest && e.target.closest('#deptDrop')) return;
  deptMenuOpen = false;
  const m = document.getElementById('deptMenu'); if (m) m.hidden = true;
  const b = document.getElementById('deptBtn'); if (b) b.setAttribute('aria-expanded', 'false');
});

// 依目前檢視(單月/全年)產生日期欄
function daysForView(){
  if (fullYear){
    const out = [];
    for (let m = 1; m <= 12; m++){ const n = daysInMonth(curYear, m); for (let d = 1; d <= n; d++){ const dow = new Date(curYear, m-1, d).getDay(); out.push({ d, date: dateStr(curYear, m, d), wd: WEEKDAY[dow], weekend: dow===0||dow===6, m }); } }
    return out;
  }
  return buildDays(curYear, curMonth);
}

function periodOfType(id){ const t=leaveTypes.find(x=>x.id===id); const s=t?(t.short_name||t.name||''):''; if(/早/.test(s))return 'morning'; if(/午/.test(s))return 'afternoon'; return 'full'; }
function isBizType(id){ const t=leaveTypes.find(x=>x.id===id); return /差/.test(t?(t.short_name||t.name||''):''); }
function dstr(d){ return dateStr(d.getFullYear(), d.getMonth()+1, d.getDate()); }

function pad(n){ return String(n).padStart(2,'0'); }
function dateStr(y,m,d){ return `${y}-${pad(m)}-${pad(d)}`; }
function daysInMonth(y,m){ return new Date(y, m, 0).getDate(); }
function todayStr(){ const t = new Date(); return dateStr(t.getFullYear(), t.getMonth()+1, t.getDate()); }

function buildDays(year, month){
  const n = daysInMonth(year, month);
  const out = [];
  for (let d = 1; d <= n; d++){
    const dow = new Date(year, month-1, d).getDay();
    out.push({ d, date: dateStr(year, month, d), wd: WEEKDAY[dow], weekend: dow===0||dow===6 });
  }
  return out;
}

function colorFor(label, legend){
  if (legend && legend[label]) return legend[label];
  return DEFAULT_COLORS[label] || '#64748b';
}

// 把過渡用的 DPC 區塊合併進 D1 來的資料：
// 取代同名(3D team（DPC）)部門、補進 DPC 的假別色與國定假日。
function mergeDpc(base, dpc){
  if (!dpc) return base;
  base.legend = { ...(dpc.legend || {}), ...(base.legend || {}) };
  base.holidays = [...new Set([...(base.holidays || []), ...(dpc.holidays || [])])];
  const name = dpc.department_name || '3D team（DPC）';
  base.departments = (base.departments || []).filter(d => d.name !== name);
  base.departments.push({ name, members: dpc.members || [] });
  return base;
}

// 由假別文字判斷是否為半天（早＝上午、午＝下午），決定色塊占滿或只占一半。
function periodOf(label){
  if (/早/.test(label)) return 'am';
  if (/午/.test(label)) return 'pm';
  return 'full';
}

// 把一格休假（可能是字串或 {label,period,color} 物件）整理成 {label, p, color}。
// p：'full' 整天、'am' 上午半天、'pm' 下午半天。
function resolveCell(lv, legend){
  if (!lv) return null;
  const label = typeof lv === 'string' ? lv : (lv.label || '');
  const rec = (typeof lv === 'object' && lv.period) ? lv.period : 'full';
  let p;
  if (rec === 'morning') p = 'am';
  else if (rec === 'afternoon') p = 'pm';
  else p = periodOf(label); // full：再用名稱判斷（如「午休」本身就是半天）
  const color = (typeof lv === 'object' && lv.color) ? lv.color : colorFor(label, legend);
  return { label, p, color };
}

// 由分槽(full/am/pm)產生一格 <td>。
// 整天 / 只有單一半天 → 整格滿版(看得清楚);同一天上午+下午都有 → 上下各半。
function cellHTML(slots, cls, empAttr, date){
  if (slots && (slots.full || slots.am || slots.pm)){
    if (slots.full){
      return `<td class="${cls}"${empAttr} data-date="${date}"><div class="chip" style="background:${slots.full.color}">${slots.full.label}</div></td>`;
    }
    // 半天：早休/上午休＝上半格、午休/下午休＝下半格；兩者可並存
    let inner = '';
    if (slots.am) inner += `<div class="chip am" style="background:${slots.am.color}">${slots.am.label}</div>`;
    if (slots.pm) inner += `<div class="chip pm" style="background:${slots.pm.color}">${slots.pm.label}</div>`;
    return `<td class="${cls} half"${empAttr} data-date="${date}"><div class="hw">${inner}</div></td>`;
  }
  return `<td class="${cls}"${empAttr} data-date="${date}"></td>`;
}

function render(data){
  LAST = data;
  const days = daysForView();
  const holidays = new Set(data.holidays || []);
  const legend = (data.legend && Object.keys(data.legend).length) ? data.legend : DEFAULT_COLORS;
  const today = todayStr();
  document.getElementById('title').textContent = '全部排休';
  syncYmSelects();

  // 圖例
  const leg = document.getElementById('legend');
  leg.innerHTML = '';
  Object.entries(legend).forEach(([label,color])=>{
    const el = document.createElement('span');
    el.className = 'item';
    el.innerHTML = `<span class="dot" style="background:${color}"></span>${label}`;
    leg.appendChild(el);
  });
  const note = document.createElement('span');
  note.className = 'note';
  note.textContent = '・半天假以半格顯示（早休＝上半、午休＝下半）';
  leg.appendChild(note);

  // 表頭
  const table = document.getElementById('table');
  let html = '<thead><tr><th class="name">姓名</th><th class="tot" title="年度累計休假日（休=1 天、午休/早休=0.5 天）">累計</th>';
  days.forEach(day=>{
    const isHol = holidays.has(day.date);
    const cls = isHol ? 'holiday' : (day.weekend ? 'weekend' : '');
    const todayCls = day.date === today ? ' today' : '';
    const hlCls = day.date === highlightDate ? ' hl' : '';
    const mstart = (fullYear && day.d === 1) ? ' mstart' : '';
    const mlabel = (fullYear && day.d === 1) ? `<div class="mtag">${day.m}月</div>` : '';
    html += `<th class="day ${cls}${todayCls}${hlCls}${mstart}" data-date="${day.date}">${mlabel}<div>${day.d}</div><div class="wd">${day.wd}</div></th>`;
  });
  html += '</tr></thead><tbody>';

  // 部門篩選：桌機沿用行內多選；手機收合為下拉多選（縮短頁首高度）
  const allDepts = data.departments || [];
  const bar = document.getElementById('deptbar');
  const escq = (s)=>(s||'').replace(/"/g,'&quot;');
  if (deptMobile.matches){
    const n = DEPTSEL.size;
    const lab = n===0 ? '全部' : (n<=2 ? [...DEPTSEL].join('、') : `已選 ${n} 個`);
    const boxes = allDepts.map(d=>
      `<label><input type="checkbox" class="dfilter" value="${escq(d.name)}" ${DEPTSEL.has(d.name)?'checked':''}/> ${d.name||''}</label>`).join('');
    bar.innerHTML = '<span class="muted">部門：</span>'
      + `<div class="deptdrop" id="deptDrop">`
      + `<button class="btn sm deptbtn" id="deptBtn" aria-expanded="${deptMenuOpen}">${lab} <span class="caret">▾</span></button>`
      + `<div class="deptmenu" id="deptMenu"${deptMenuOpen?'':' hidden'}>${boxes}`
      + `<div class="foot"><button class="btn sm" id="dfClear">清除</button><button class="btn sm today-btn" id="dfClose">完成</button></div>`
      + `</div></div>`;
    const dbtn = document.getElementById('deptBtn');
    const dmenu = document.getElementById('deptMenu');
    dbtn.onclick = (e)=>{ e.stopPropagation(); deptMenuOpen = !deptMenuOpen; dmenu.hidden = !deptMenuOpen; dbtn.setAttribute('aria-expanded', deptMenuOpen); };
    const dfx = document.getElementById('dfClose'); if (dfx) dfx.onclick = ()=>{ deptMenuOpen=false; dmenu.hidden=true; dbtn.setAttribute('aria-expanded','false'); };
  } else {
    bar.innerHTML = '<span class="muted">部門：</span>' + allDepts.map(d=>
      `<label class="item" style="cursor:pointer;"><input type="checkbox" class="dfilter" value="${escq(d.name)}" ${DEPTSEL.has(d.name)?'checked':''}/> ${d.name||''}</label>`).join('')
      + (DEPTSEL.size ? ' <button class="btn sm" id="dfClear" style="padding:2px 8px;">清除</button>' : '');
  }
  bar.querySelectorAll('.dfilter').forEach(c=>c.onchange=()=>{ c.checked?DEPTSEL.add(c.value):DEPTSEL.delete(c.value); if (deptMobile.matches) deptMenuOpen = true; render(LAST); });
  const dfc = document.getElementById('dfClear'); if (dfc) dfc.onclick=()=>{ DEPTSEL.clear(); if (deptMobile.matches) deptMenuOpen = true; render(LAST); };

  // 假別篩選（所有人可用）：桌機色票 chip、手機下拉；空＝全部
  const tbar = document.getElementById('typebar');
  if (tbar){
    const ttypes = leaveTypes.length ? leaveTypes
      : Object.entries(legend).map(([sn,c])=>({ short_name:sn, name:sn, color:c }));
    if (deptMobile.matches){
      const opts = '<option value="">全部假別</option>' + ttypes.map(t=>{
        const v = t.short_name||t.name;
        return `<option value="${escq(v)}" ${typeFilter===v?'selected':''}>${t.name||t.short_name}</option>`;
      }).join('');
      tbar.innerHTML = '<span class="muted">只看假別：</span><select id="tfsel" class="ymsel">'+opts+'</select>';
      document.getElementById('tfsel').onchange = (e)=>{ typeFilter = e.target.value; render(LAST); };
    } else {
      let h = '<span class="muted">只看假別：</span>'
        + `<button class="tchip tall${typeFilter===''?' on':''}" data-tf="">全部</button>`;
      h += ttypes.map(t=>{
        const v = t.short_name||t.name;
        return `<button class="tchip${typeFilter===v?' on':''}" data-tf="${escq(v)}" style="--c:${t.color||'#64748b'}" title="${escq(t.name||v)}">${t.short_name||t.name}</button>`;
      }).join('');
      tbar.innerHTML = h;
      tbar.querySelectorAll('.tchip').forEach(b=>b.onclick=()=>{ typeFilter = b.dataset.tf; render(LAST); });
    }
  }

  // 內容（依部門分組）。同時建立 EMP 索引供編輯/警示使用。
  HOLIDAYS = holidays;
  EMP = {}; EMP_DEPT = {}; DEPT_MEMBERS = {};
  const colCount = days.length + 2; // 姓名 + 累計
  const yearTotals = data.year_totals || {};
  const depts = DEPTSEL.size ? allDepts.filter(d=>DEPTSEL.has(d.name)) : allDepts;
  let anyMember = false;
  depts.forEach((dept, di)=>{
    const members = (dept.members || []).filter(memberHasType);
    if (typeFilter && !members.length) return; // 篩選假別時，無人有此假別的部門整段略過
    html += `<tr class="dept"><td colspan="${colCount}"><span class="deptlabel">${dept.name || ''}</span></td></tr>`;
    DEPT_MEMBERS[di] = [];
    members.forEach(m=>{
      anyMember = true;
      if (m.id){ EMP[m.id] = { name: m.name, leaves: m.leaves || {} }; EMP_DEPT[m.id] = di; DEPT_MEMBERS[di].push(m.id); }
      const empAttr = m.id ? ` data-emp="${m.id}"` : '';
      const meRow = (m.id && window.App && App.me && App.me.id === m.id) ? ' merow' : '';
      const rowAttr = m.id ? ` class="emprow${meRow}" draggable="true" data-emp="${m.id}" data-dept="${di}"` : '';
      const tot = m.id != null ? (yearTotals[m.id] || 0) : 0;
      html += `<tr${rowAttr}><td class="name"><div class="n">${m.id?'<span class="grip">⋮⋮</span> ':''}${m.name||''}</div></td><td class="tot">${tot||''}</td>`;
      days.forEach(day=>{
        const isHol = holidays.has(day.date);
        const baseCls = isHol ? 'holiday' : (day.weekend ? 'weekend' : '');
        const todayCls = day.date === today ? ' today' : '';
        const hlCls = day.date === highlightDate ? ' hl' : '';
        const mstart = (fullYear && day.d === 1) ? ' mstart' : '';
        const pick = (rangeMode && rangeEmp===m.id && rangeStart===day.date) ? ' picking' : '';
        const cls = `day ${baseCls}${todayCls}${hlCls}${mstart}${pick}`;
        const slots = m.leaves ? m.leaves[day.date] : null;
        html += cellHTML(filterSlots(slots), cls, empAttr, day.date);
      });
      html += '</tr>';
    });
  });
  html += '</tbody>';
  table.innerHTML = html;
  attachDrag();

  const status = document.getElementById('status');
  if (!anyMember){
    status.className = 'status';
    status.textContent = '本月查無人員或休假資料。';
    status.style.display = '';
    table.style.display = 'none';
  } else {
    status.style.display = 'none';
    table.style.display = '';
  }

  const foot = document.getElementById('footer');
  foot.textContent = data.updated_at
    ? `資料更新時間：${new Date(data.updated_at).toLocaleString('zh-TW')}`
    : '';
}

// ── 編輯：選假別 + 單擊填入 / 雙擊取消 / 區間請假（改任一員工）─────────
const isAdmin = ()=> !!(window.App && window.App.isAdmin);
async function initEditing(){
  if (editingInit) return;
  editingInit = true;
  const sel = document.getElementById('ltype'); // 非管理員時工具列已被移除
  if (sel) {
    try { leaveTypes = await (await fetch(`${API_BASE}/api/leave-types`, { cache:'no-store' })).json(); } catch (_) { leaveTypes = []; }
    sel.innerHTML = '<option value="">下拉選單</option>' + leaveTypes.map(t=>`<option value="${t.id}">${t.name}</option>`).join('');
    sel.onchange = (e)=>{ selType = e.target.value; };
    const rb = document.getElementById('rangeBtn');
    rb.onclick = ()=>{ rangeMode = !rangeMode; rangeEmp = null; rangeStart = null; rb.classList.toggle('today-btn', rangeMode); document.getElementById('editHint').textContent = rangeMode ? '區間：點某人某天當起點，再點同一列的結束日' : ''; render(LAST); };
  }
  const table = document.getElementById('table');
  table.addEventListener('click', (e)=>{ if (!isAdmin()) return; const td = e.target.closest('td.day[data-emp]'); if (td) onCell(td.dataset.emp, td.dataset.date); });
  table.addEventListener('dblclick', (e)=>{ const td = e.target.closest('td.day[data-emp]'); if (td){ if (isAdmin()) onCellDbl(td.dataset.emp, td.dataset.date, e); return; } const th = e.target.closest('th.day[data-date]'); if (th){ highlightDate = highlightDate===th.dataset.date ? null : th.dataset.date; render(LAST); } });
}

// 拖曳排序員工（限同部門）：放開後依新順序重設 sort_order。
function attachDrag(){
  if (!isAdmin()) return; // 僅管理員可拖曳排序
  document.querySelectorAll('tr.emprow').forEach(tr=>{
    tr.ondragstart = (e)=>{ dragEmp = tr.dataset.emp; tr.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; };
    tr.ondragend = ()=>{ tr.classList.remove('dragging'); document.querySelectorAll('.dragover').forEach(x=>x.classList.remove('dragover')); };
    tr.ondragover = (e)=>{ if (dragEmp && tr.dataset.dept === EMP_DEPT[dragEmp]+'' ){ e.preventDefault(); tr.classList.add('dragover'); } };
    tr.ondragleave = ()=>tr.classList.remove('dragover');
    tr.ondrop = (e)=>{ e.preventDefault(); tr.classList.remove('dragover'); const target = tr.dataset.emp; const dragged = dragEmp; dragEmp = null; if (dragged && target && dragged !== target) reorderEmp(dragged, target); };
  });
}
async function reorderEmp(draggedId, targetId){
  const dk = EMP_DEPT[draggedId];
  if (dk == null || dk !== EMP_DEPT[targetId]) { App.toast('只能在同一部門內調整順序','err'); return; }
  const arr = (DEPT_MEMBERS[dk] || []).slice();
  const from = arr.indexOf(draggedId); if (from < 0) return;
  arr.splice(from, 1);
  const to = arr.indexOf(targetId);
  arr.splice(to < 0 ? arr.length : to, 0, draggedId);
  for (let i = 0; i < arr.length; i += 10){
    await Promise.all(arr.slice(i, i+10).map((id, j)=> App.adminApi(`/api/admin/employees/${id}`, { method:'PUT', body: JSON.stringify({ sort_order: (i + j + 1) * 10 }) })));
  }
  load(true);
}
function periodToSlot(p){ return p === 'morning' ? 'am' : p === 'afternoon' ? 'pm' : 'full'; }
function onCell(empId, date){
  const emp = EMP[empId]; if (!emp) return;
  const slots = emp.leaves && emp.leaves[date];
  if (rangeMode){
    if (!selType){ App.toast('請先選擇假別','err'); return; }
    if (!rangeStart || rangeEmp !== empId){ rangeEmp = empId; rangeStart = date; render(LAST); return; }
    const a = rangeStart < date ? rangeStart : date, b = rangeStart < date ? date : rangeStart;
    const who = rangeEmp; rangeStart = null; rangeEmp = null;
    fillRangeRow(who, a, b, selType);
    return;
  }
  if (!selType){ if (slots) return; App.toast('請先從上方「選擇假別」','err'); return; } // 已有假→不提示,雙擊取消
  const slot = periodToSlot(periodOfType(selType));
  if (slots && slots[slot]) return; // 該時段已有 → 不重複填(取消請雙擊)
  fillCell(empId, date, selType);
}
// 三選一對話框（系統樣式、置中），回傳所按按鈕的 value；點背景＝null
function confirmChoice(message, buttons){
  return new Promise(resolve=>{
    const wrap = document.createElement('div');
    wrap.className = 'modal-scrim';
    wrap.innerHTML = `<div class="modal"><h3>確認</h3>`
      + `<p style="margin:0 0 16px;white-space:pre-wrap;line-height:1.6;">${App.esc(message)}</p>`
      + `<div class="actions">${buttons.map((b,i)=>`<button class="btn ${b.danger?'danger':(b.primary?'primary':'')}" data-i="${i}">${App.esc(b.label)}</button>`).join('')}</div></div>`;
    document.body.appendChild(wrap);
    const done = (v)=>{ wrap.remove(); resolve(v); };
    wrap.querySelectorAll('button[data-i]').forEach(btn=>btn.onclick=()=>done(buttons[+btn.dataset.i].value));
    wrap.onclick = (e)=>{ if (e.target===wrap) done(null); };
  });
}
async function onCellDbl(empId, date, ev){
  const emp = EMP[empId]; const slots = emp && emp.leaves && emp.leaves[date]; if (!slots) return;
  if (slots.full && periodOf(slots.full.label) === 'full'){
    const run = buildRun(empId, date);
    if (run){
      const v = await confirmChoice(`這是一段連續 ${run.length} 天的假，要怎麼取消？`, [
        { label:`刪整段 ${run.length} 天`, value:'whole', danger:true },
        { label:'只刪這一天', value:'one' },
        { label:'保留', value:null },
      ]);
      if (v==='whole') delByDate(empId, run);
      else if (v==='one') delByDate(empId, [date]);
    } else if (await App.confirm('取消這格的請假？', { title:'取消請假', danger:true })) {
      delByDate(empId, [date]);
    }
    return;
  }
  // 半天：依滑鼠 Y 座標決定刪上午(上半)或下午(下半)
  const td = ev && ev.target.closest('td.day');
  let topHalf = true;
  if (td){ const r = td.getBoundingClientRect(); topHalf = ev.clientY < r.top + r.height/2; }
  let period = null;
  const am = slots.am || (slots.full && periodOf(slots.full.label)==='am');
  const pm = slots.pm || (slots.full && periodOf(slots.full.label)==='pm');
  if (topHalf && am) period = 'morning';
  else if (!topHalf && pm) period = 'afternoon';
  else period = slots.am ? 'morning' : slots.pm ? 'afternoon' : null;
  if (!period){ if (await App.confirm('取消這格的請假？', { title:'取消請假', danger:true })) delByDate(empId, [date]); return; }
  if (await App.confirm(`取消這天的${period==='morning'?'上午':'下午'}休假？`, { title:'取消半天假', danger:true })) delByDate(empId, [date], period);
}
function buildRun(empId, date){
  const lv = EMP[empId].leaves; const here = lv[date]; if (!here || !here.full) return null;
  const lab = here.full.label; const has = (s)=> lv[s] && lv[s].full && lv[s].full.label === lab;
  const dates = [date];
  let d = new Date(date+'T00:00:00');
  while (true){ d.setDate(d.getDate()-1); const s = dstr(d); if (has(s)) dates.unshift(s); else break; }
  d = new Date(date+'T00:00:00');
  while (true){ d.setDate(d.getDate()+1); const s = dstr(d); if (has(s)) dates.push(s); else break; }
  return dates.length > 1 ? dates : null;
}
async function warnFor(empId, dates, type){
  if (isBizType(type) || !dates.length) return [];
  try {
    const r = await fetch(`${API_BASE}/api/leave-check?employee_id=${encodeURIComponent(empId)}&dates=${dates.join(',')}`, { cache:'no-store' });
    if (!r.ok) return [];
    const data = await r.json(); const msgs = [];
    for (const dd of dates){ const w = data.results[dd]; if (!w) continue;
      if (w.deputies && w.deputies.length) msgs.push(`${dd}：職代 ${w.deputies.join('、')} 當天也請假`);
      if (w.over) msgs.push(`${dd}：部門當天請假已達 1/3（已 ${w.dept_count} 人）`);
    }
    return msgs;
  } catch (_) { return []; }
}
async function fillCell(empId, date, type){
  const w = await warnFor(empId, [date], type);
  if (w.length && !(await App.confirm(`${EMP[empId].name}：\n` + w.join('\n') + '\n\n仍要請假嗎？', { title:'請假提醒', okText:'仍要請假' }))) return;
  const r = await App.adminApi('/api/admin/leaves', { method:'POST', body: JSON.stringify({ employee_id: empId, date, leave_type_id: type, period: periodOfType(type) }) });
  if (!r.ok){ App.toast('填入失敗（需管理員權限）','err'); return; }
  load(true);
}
async function delByDate(empId, dates, period){
  const body = { employee_id: empId, dates };
  if (period) body.period = period;
  const r = await App.adminApi('/api/admin/leaves/delete-by-date', { method:'POST', body: JSON.stringify(body) });
  if (!r.ok){ App.toast('刪除失敗','err'); return; }
  load(true);
}
async function fillRangeRow(empId, a, b, type){
  const biz = isBizType(type); const items = [];
  const d = new Date(a+'T00:00:00'), end = new Date(b+'T00:00:00');
  for (; d <= end; d.setDate(d.getDate()+1)){
    const dow = d.getDay(); const date = dstr(d);
    if (!biz && (dow===0 || dow===6 || HOLIDAYS.has(date))) continue;
    items.push({ date, leave_type_id: type, period: periodOfType(type) });
  }
  if (!items.length){ App.toast('此區間內沒有可請假的日子（週末/假日已略過）','err'); render(LAST); return; }
  const w = await warnFor(empId, items.map(i=>i.date), type);
  if (w.length && !(await App.confirm(`${EMP[empId].name}：\n` + w.join('\n') + '\n\n仍要送出區間請假嗎？', { title:'區間請假提醒', okText:'仍要送出' }))){ render(LAST); return; }
  const r = await App.adminApi('/api/admin/leaves/bulk', { method:'POST', body: JSON.stringify({ employee_id: empId, items }) });
  if (!r.ok){ App.toast('區間請假失敗','err'); return; }
  load(true);
}

let LAST = null; // 最近一次 render 用的資料（區間高亮重繪用）

// 身分判定完成後重繪一次（補上本人列黃底/管理元素）
document.addEventListener('app:ready', ()=>{ if (LAST) render(LAST); });

async function load(silent){
  const status = document.getElementById('status');
  const sc = document.querySelector('.scroll');
  const keepL = sc ? sc.scrollLeft : 0, keepT = sc ? sc.scrollTop : 0;
  if (!silent){
    status.className = 'status';
    status.textContent = '載入中…';
    status.style.display = '';
    document.getElementById('table').style.display = 'none';
  }
  // 先發出行事曆請求，與 initEditing（抓假別）並行，少一趟往返
  // 用 App.api 帶上裝置 token，後端才能依檢視者身分限縮可見部門
  const pCal = App.api(`/api/calendar?year=${curYear}&month=${curMonth}`, { cache: 'no-store' });
  await initEditing();
  try {
    const res = await pCal;
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data && data.error) throw new Error(data.error);

    // D1 已經有 DPC（已由 Worker 同步進來）→ 直接用 D1。
    // 還沒有（尚未部署/同步）→ 暫時合併靜態 dpc.json 當過渡，讓畫面先有資料。
    const hasDpcInD1 = (data.departments || []).some((d) => /DPC/i.test(d.name || ''));
    if (hasDpcInD1) {
      render(data);
    } else {
      let dpc = null;
      try {
        const r2 = await fetch(DPC_URL, { cache: 'no-store' });
        if (r2.ok) dpc = await r2.json();
      } catch (_) { /* ignore */ }
      render(mergeDpc(data, dpc));
      if (dpc && dpc.updated_at) {
        const foot = document.getElementById('footer');
        const dpcTxt = `DPC 過渡資料：${new Date(dpc.updated_at).toLocaleString('zh-TW')}`;
        foot.textContent = foot.textContent ? `${foot.textContent}　|　${dpcTxt}` : dpcTxt;
      }
    }
    if (silent && sc){ sc.scrollLeft = keepL; sc.scrollTop = keepT; }
  } catch (e) {
    if (silent){ App.toast('更新顯示失敗，請重新整理','err'); return; }
    status.className = 'status err';
    status.textContent = `讀取資料失敗：${e.message}（API：${API_BASE}/api/calendar）`;
  }
}

function go(delta){
  if (fullYear){ curYear += delta; }
  else { const d = new Date(curYear, curMonth - 1 + delta, 1); curYear = d.getFullYear(); curMonth = d.getMonth() + 1; }
  load().then(scrollToToday);
}
function scrollToToday(){
  const sc = document.querySelector('.scroll');
  const th = document.querySelector(`th.day[data-date="${todayStr()}"]`);
  if (sc && th) sc.scrollLeft = Math.max(0, th.offsetLeft - 140);
}

// 年/月下拉與目前檢視同步（全年模式隱藏月份）
function syncYmSelects(){
  document.getElementById('selYear').innerHTML = App.yearOptions(curYear);
  const sm = document.getElementById('selMonth');
  sm.innerHTML = App.monthOptions(curMonth);
  sm.style.display = fullYear ? 'none' : '';
}
document.getElementById('selYear').onchange = (e) => { curYear = Number(e.target.value); load().then(scrollToToday); };
document.getElementById('selMonth').onchange = (e) => { curMonth = Number(e.target.value); load().then(scrollToToday); };

document.getElementById('prev').onclick = () => go(-1);
document.getElementById('next').onclick = () => go(1);
document.getElementById('todayBtn').onclick = () => {
  const t = new Date();
  curYear = t.getFullYear(); curMonth = t.getMonth() + 1;
  load().then(scrollToToday);
};
document.getElementById('yearBtn').onclick = () => {
  fullYear = !fullYear;
  document.getElementById('yearBtn').classList.toggle('today-btn', fullYear);
  document.getElementById('yearBtn').textContent = fullYear ? '單月' : '全年';
  load().then(scrollToToday);
};

syncYmSelects(); // 載入完成前先讓下拉有內容
load().then(scrollToToday);
</script>
