<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#2563eb" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="開發處排休表" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icon-180.png" />
<title>儀表板 · 開發處休假表</title>
<link rel="stylesheet" href="app.css" />
<style>
  .greet h1{ font-size:20px; margin:0; font-weight:600; }
  .greet .sub{ color:var(--muted); font-size:14px; margin-top:2px; }
  .datebar{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:8px; margin:12px 0; box-shadow:var(--shadow); }
  .datebar .dlabel{ flex:1; text-align:center; }
  .datebar input[type=date]{ border:none; }
  .deptcard{ background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 14px; margin-bottom:12px; box-shadow:var(--shadow); display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .deptcard label{ display:inline-flex; align-items:center; gap:5px; font-size:14px; cursor:pointer; }
  .lgroup{ margin-top:6px; }
  .lghead{ font-size:13px; font-weight:600; color:#475569; background:#f8fafc; border-radius:6px; padding:4px 8px; margin:8px 0 2px; }
  .leave-item{ display:flex; align-items:center; gap:10px; padding:10px 4px; border-bottom:1px solid var(--border); }
  .leave-item:last-child{ border-bottom:none; }
  .leave-item .nm{ font-weight:600; }
  .leave-item .dp{ color:var(--muted); font-size:14px; font-weight:400; }
  .leave-item .sp{ flex:1; }
  .typewrap{ display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
  .lgwarn{ color:#b45309; font-size:12px; line-height:1.5; margin:0 0 4px; padding:0 8px; }
  .grpsel{ padding:4px 8px; font-size:13px; border-radius:8px; }
  .warn-below{ color:var(--muted); font-size:13px; line-height:1.6; }
  .warn-below .wl{ color:#b45309; }
  .nwk{ display:inline-block; background:#f3f4f6; color:var(--muted); font-size:14px; border-radius:6px; padding:1px 8px; margin-left:8px; }
  /* 未來 7 天展望：一格一天，點了切換檢視日期 */
  .owrap{ display:flex; gap:6px; }
  .owday{ flex:1; min-width:0; position:relative; text-align:center; font:inherit; background:#fff; border:1px solid var(--border); border-radius:8px; padding:6px 2px; cursor:pointer; }
  .owday:hover{ border-color:var(--blue); }
  .owday.sel{ border-color:var(--blue); box-shadow:inset 0 0 0 1px var(--blue); }
  .owday.nonwork{ background:#f8fafc; }
  .owday .wd{ font-size:12px; color:var(--muted); }
  .owday .dnum{ font-size:14px; font-weight:600; margin:1px 0; }
  .owday .cnt{ font-size:12px; color:var(--muted); }
  .owday .cnt b{ font-size:14px; color:#111827; }
  .owday .dot{ position:absolute; top:5px; right:6px; width:7px; height:7px; border-radius:50%; background:#dc2626; }
  /* 部門人力：每部門一個區塊（標題＋人數一行 → 占比條 → 休假者膠囊 → 警示框） */
  .drow{ padding:11px 0; border-bottom:1px solid var(--border); }
  .drow:last-child{ border-bottom:none; }
  .dhead{ display:flex; align-items:baseline; justify-content:space-between; gap:8px; }
  .dhead .dn{ font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .dhead .num{ font-size:13px; color:var(--muted); white-space:nowrap; flex:none; }
  .dtag{ display:inline-block; margin-left:6px; font-size:11px; font-weight:600; color:#dc2626; background:#fef2f2; border:1px solid #fecaca; border-radius:999px; padding:0 6px; vertical-align:1px; }
  .bar{ height:8px; background:#f1f5f9; border-radius:99px; overflow:hidden; margin:7px 0; }
  .bar i{ display:block; height:100%; border-radius:99px; }
  .people{ display:flex; flex-wrap:wrap; gap:6px; margin:7px 0 0; }
  .ppill{ display:inline-flex; align-items:center; gap:7px; background:#f8fafc; border:1px solid var(--border); border-radius:999px; padding:3px 5px 3px 11px; font-size:13px; font-weight:600; }
  .ppill .pe{ color:var(--muted); font-weight:400; font-size:12px; }
  .ppill .chip{ font-size:11px; padding:1px 8px; border-radius:999px; }
  /* 警示：獨立黃色提示框，逐項換行，不再擠成右側長句 */
  .dwarn{ display:flex; gap:7px; align-items:flex-start; margin-top:8px; padding:7px 10px;
    background:#fffbeb; border:1px solid #fde68a; border-radius:8px; font-size:12px; color:#92400e; line-height:1.55; }
  .dwarn .wi{ flex:none; }
  .dwarn .wlines{ min-width:0; }
  @media (max-width:560px){
    .owday .cnt{ font-size:11px; } .ppill .pe{ display:none; }

    /* ── 頁首瘦身：問候、日期列、部門篩選更緊湊，KPI 卡縮小 ── */
    .greet h1{ font-size:18px; }
    /* 日期列瘦身；部門篩選（在當週概覽下方）縮內距 */
    .ctrlrow .datebar{ margin:10px 0; padding:6px; }
    .deptcard{ padding:8px 12px; }
    /* KPI 卡：縮內距與數字字級，2×2 更緊湊 */
    .kpi-grid{ gap:8px; margin-bottom:8px !important; }
    .kpi-grid .card{ padding:11px 13px; }
    .kpi .label{ font-size:13px; }
    .kpi .val{ font-size:23px; margin-top:4px; }
  }
</style>
</head>
<body class="has-shell">
<main class="app-main">
  <div class="greet">
    <h1 id="hello">儀表板</h1>
  </div>

  <div class="ctrlrow">
    <div class="datebar">
      <button class="btn sm" id="prev" aria-label="上一週" title="上一週">‹</button>
      <input type="date" id="date" class="dlabel" aria-label="選擇日期" />
      <button class="btn sm" id="next" aria-label="下一週" title="下一週">›</button>
      <button class="btn sm" id="today">今天</button>
    </div>
  </div>

  <div id="owbox"></div>
  <div class="deptcard"><span class="muted">部門：</span><span id="deptboxes" class="row" style="gap:14px;"></span></div>
  <div id="content"><div class="status">載入中…</div></div>
</main>

<script src="app.js"></script>
<script>
const { esc } = App;
const PERIOD = { full:'整天', morning:'上午', afternoon:'下午' };
let cur = new Date();
let DEPTSEL = new Set();
let me = null;
// 休假人員分組：none / dept / type。改用 dash_group2 鍵＝一次性遷移，
// 讓存過舊偏好（如「不分組」）的使用者也先看到新的「依部門」整併視圖。
let groupMode = localStorage.getItem('dash_group2') || 'dept';

// 部門篩選：桌機行內多選；手機收合為下拉
let DEPTS = [];
let deptMenuOpen = false;
const deptMobile = window.matchMedia('(max-width: 560px)');
deptMobile.addEventListener('change', ()=>{ deptMenuOpen = false; renderDeptFilter(); });
document.addEventListener('click', (e)=>{
  if (!deptMenuOpen) return;
  if (e.target.closest && e.target.closest('#deptDrop')) return;
  deptMenuOpen = false;
  const m = document.getElementById('deptMenu'); if (m) m.hidden = true;
});

function pad(n){ return String(n).padStart(2,'0'); }
function ymd(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function greetWord(){ const h = new Date().getHours(); return h < 11 ? '早安' : h < 18 ? '午安' : '晚安'; }
function deptName(id){ const d = DEPTS.find(x=>String(x.id)===String(id)); return d ? d.name : ''; }

function renderDeptFilter(){
  const host = document.getElementById('deptboxes');
  if (!DEPTS.length){ host.innerHTML = '<span class="muted">無部門</span>'; return; }
  const boxes = DEPTS.map(d=>
    `<label><input type="checkbox" class="df" value="${esc(d.id)}" ${DEPTSEL.has(String(d.id))?'checked':''}/> ${esc(d.name)}</label>`).join('');
  if (deptMobile.matches){
    const n = DEPTSEL.size;
    const lab = n===0 ? '全部' : (n<=2 ? [...DEPTSEL].map(deptName).filter(Boolean).join('、') : `已選 ${n} 個`);
    host.innerHTML = `<div class="deptdrop" id="deptDrop">`
      + `<button class="btn sm deptbtn" id="deptBtn" aria-expanded="${deptMenuOpen}">${esc(lab)} <span class="caret">▾</span></button>`
      + `<div class="deptmenu" id="deptMenu"${deptMenuOpen?'':' hidden'}>${boxes}`
      + `<div class="foot"><button class="btn sm" id="dfClear">清除</button><button class="btn sm primary" id="dfClose">完成</button></div>`
      + `</div></div>`;
    const dbtn = document.getElementById('deptBtn');
    const dmenu = document.getElementById('deptMenu');
    dbtn.onclick = (e)=>{ e.stopPropagation(); deptMenuOpen = !deptMenuOpen; dmenu.hidden = !deptMenuOpen; dbtn.setAttribute('aria-expanded', deptMenuOpen); };
    const dfx = document.getElementById('dfClose'); if (dfx) dfx.onclick = ()=>{ deptMenuOpen=false; dmenu.hidden=true; dbtn.setAttribute('aria-expanded','false'); };
  } else {
    host.innerHTML = boxes;
  }
  host.querySelectorAll('.df').forEach(c=>c.onchange=()=>{ c.checked?DEPTSEL.add(c.value):DEPTSEL.delete(c.value); if (deptMobile.matches) deptMenuOpen = true; renderDeptFilter(); load(); });
  const dfc = document.getElementById('dfClear'); if (dfc) dfc.onclick=()=>{ DEPTSEL.clear(); if (deptMobile.matches) deptMenuOpen = true; renderDeptFilter(); load(); };
}

async function boot(){
  load(); // 當日資料不依賴身分，最先發出
  // 部門篩選（與儀表板資料並行載入）；桌機行內多選、手機收合為下拉
  fetch(`${App.API_BASE}/api/departments`,{cache:'no-store'}).then(r=>r.json()).then(ds=>{
    DEPTS = ds || []; renderDeptFilter();
  }).catch(()=>{ DEPTS = []; renderDeptFilter(); });
  // 身分由 app.js 提供（含快取），不再自打 /api/me（打招呼用）
  me = (await App.ready).me;
  document.getElementById('hello').textContent = me ? `${greetWord()}，${me.name}！` : `${greetWord()}！`;
}

let loadSeq = 0; // 防止快速連點時舊回應蓋掉新回應
async function load(){
  document.getElementById('date').value = ymd(cur);
  const c = document.getElementById('content');
  const ob = document.getElementById('owbox');
  const seq = ++loadSeq;
  // 換日期不清空畫面：舊內容降透明度示意載入中，新資料到了一次換上（不閃）
  if (c.dataset.loaded){ c.style.opacity = '.55'; ob.style.opacity = '.55'; }
  else c.innerHTML = '<div class="status">載入中…</div>';
  try {
    const dept = [...DEPTSEL].join(',');
    const r = await fetch(`${App.API_BASE}/api/dashboard?date=${ymd(cur)}${dept?`&dept=${dept}`:''}`, { cache:'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    if (seq !== loadSeq) return;
    render(data);
    c.dataset.loaded = '1';
  } catch (e) {
    if (seq === loadSeq) c.innerHTML = `<div class="status err">讀取失敗：${esc(e.message)}</div>`;
  } finally {
    if (seq === loadSeq){ c.style.opacity = ''; ob.style.opacity = ''; }
  }
}

function render(s){
  const types = s.by_type || [];
  const typeChips = types.length
    ? `<div class="typewrap">${types.map(t=>`<span class="chip" style="background:${esc(t.color||'#64748b')}">${esc(t.short_name||t.name)} ${t.count}</span>`).join('')}</div>`
    : '<div class="val" style="font-size:16px;color:var(--muted);margin-top:8px;">無請假</div>';

  const list = s.on_leave_list || [];
  const chip = (p)=>`<span class="chip" style="background:${esc(p.color||'#64748b')}">${esc(p.label)}${p.period&&p.period!=='full'&&!/[早午]/.test(p.label)?`・${PERIOD[p.period]||''}`:''}</span>`;
  // 一筆休假人員的列（withDept：是否在名字下方補上部門小字）
  const item = (p,withDept)=>`<div class="leave-item">
    <div><div class="nm">${esc(p.name)}${p.english_name?` <span class="dp">${esc(p.english_name)}</span>`:''}</div>${withDept&&p.department?`<div class="dp">${esc(p.department)}</div>`:''}</div>
    <div class="sp"></div>
    ${chip(p)}
  </div>`;

  // 異常請假：後端綁在個人身上。依部門分組時標在部門標題下（部門層級原因去重、個人原因標當事人）；
  // 其餘模式則收在名單下方一張低調卡片。
  const warns = s.warnings || [];
  const pDept = new Map();
  list.forEach(p=>pDept.set(`${p.name}|${p.english_name||''}`, p.department||'未分部門'));
  const deptWarn = new Map();
  warns.forEach(w=>{
    // 多部門的人，警示掛到其每個部門段落
    for (const dept of (pDept.get(`${w.name}|${w.english_name||''}`) || '未分部門').split('、')){
      let g = deptWarn.get(dept);
      if (!g){ g = { deptReasons:new Set(), people:[] }; deptWarn.set(dept, g); }
      const own = [];
      (w.reasons||[]).forEach(r=>{ if (/1\/3/.test(r)) g.deptReasons.add(r); else own.push(r); });
      if (own.length) g.people.push({ name:w.name, reasons:own });
    }
  });
  const warnHead = (dept)=>{
    const g = deptWarn.get(dept);
    if (!g) return '';
    const parts = [...g.deptReasons].map(esc);
    g.people.forEach(p=>parts.push(`${esc(p.name)}：${p.reasons.map(esc).join('、')}`));
    return parts.length
      ? `<div class="dwarn"><span class="wi">⚠</span><div class="wlines">${parts.map(p=>`<div>${p}</div>`).join('')}</div></div>`
      : '';
  };

  // 依 key 分組，保留首次出現次序
  const groupBy = (keyOf)=>{ const out=[]; const m=new Map(); list.forEach(p=>{ const k=keyOf(p); let g=m.get(k); if(!g){g={key:k,color:p.color,items:[]};m.set(k,g);out.push(g);} g.items.push(p); }); return out; };

  let listHtml;
  if (groupMode === 'dept'){
    // 部門人力條狀圖＋人＋警示：每部門一列（部門名／占比條／請假數），
    // 底下接該部門休假者膠囊與警示行；沒人請假的部門只留條狀列。
    const ds = s.dept_stats || [];
    const inDept = (p, name) => (p.department||'').split('、').includes(name);
    const knownNames = new Set(ds.map(d=>d.name));
    const pill = (p)=>`<span class="ppill">${esc(p.name)}${p.english_name?` <span class="pe">${esc(p.english_name)}</span>`:''}${chip(p)}</span>`;
    const drow = (d, items)=>{
      const pct = d.active ? Math.min(100, Math.round(d.on_leave/d.active*100)) : 0;
      const color = d.over ? '#dc2626' : (d.limit>0 && d.on_leave===d.limit-1 ? '#f59e0b' : '#94a3b8');
      return `<div class="drow">
        <div class="dhead">
          <span class="dn">${esc(d.name)}${d.over?'<span class="dtag">達 1/3</span>':''}</span>
          <span class="num">${d.active?`${d.on_leave}／${d.active} 人請假`:`${d.on_leave} 人請假`}</span>
        </div>
        <div class="bar"><i style="width:${pct}%;background:${color};"></i></div>
        ${items.length?`<div class="people">${items.map(pill).join('')}</div>`:''}
        ${warnHead(d.name)}
      </div>`;
    };
    listHtml = ds.filter(d=>d.on_leave>0).map(d=>drow(d, list.filter(p=>inDept(p, d.name)))).join('');
    // 不屬於任何已列部門的人，收在「未分部門」列
    const rest = list.filter(p=>!(p.department||'').split('、').some(n=>knownNames.has(n)));
    if (rest.length){
      listHtml += drow({ name:'未分部門', active:0, on_leave:rest.length, limit:0, over:false }, rest);
    }
    if (!list.length) listHtml = '<div class="muted" style="padding:2px 2px 6px;">今日無休假人員</div>' + listHtml;
  } else if (!list.length){
    listHtml = '<div class="empty"><div style="margin-top:8px;">今日無休假人員</div></div>';
  } else if (groupMode === 'type'){
    listHtml = groupBy(p=>p.label||'其他').map(g=>`<div class="lgroup">
        <div class="lghead"><span class="chip" style="background:${esc(g.color||'#64748b')}">${esc(g.key)}</span><span class="muted"> ${g.items.length}</span></div>
        ${g.items.map(p=>item(p,true)).join('')}
      </div>`).join('');
  } else {
    listHtml = list.map(p=>item(p,true)).join('');
  }

  // 名單下方異常卡片（不分組 / 依假別 時顯示）
  const warnBelow = (groupMode !== 'dept' && warns.length) ? `
    <div class="card" style="margin-top:12px;">
      <div class="warn-below"><span class="wl">異常請假 ${warns.length} 筆</span>　${warns.map(w=>`${esc(w.name)}（${w.reasons.map(esc).join('、')}）`).join('；')}</div>
    </div>` : '';

  // 當週概覽（週一～週日，固定不捲動）：藍框＝目前檢視日，點任一格切換；
  // 紅點＝該日有部門達 1/3 上限；灰底＝非工作日。
  // 渲染到獨立的 #owbox，讓靜態的部門篩選列固定夾在「當週概覽」與其餘內容之間。
  const WD = ['日','一','二','三','四','五','六'];
  const ow = s.outlook || [];
  const owHtml = ow.length ? `
    <div class="card" style="margin-bottom:12px;">
      <div class="row" style="justify-content:space-between;margin-bottom:8px;">
        <b>當週概覽</b><span class="muted" style="font-size:12px;">點日期切換檢視</span>
      </div>
      <div class="owrap">${ow.map(d=>{
        const dt = new Date(d.date+'T00:00:00');
        const over = d.over_depts||[];
        return `<button type="button" class="owday${d.date===s.date?' sel':''}${d.non_working?' nonwork':''}" data-d="${esc(d.date)}"
          title="${over.length?esc(over.join('、')+' 達 1/3 上限'):''}">
          ${over.length?'<span class="dot"></span>':''}
          <div class="wd">${WD[dt.getDay()]}</div>
          <div class="dnum">${dt.getMonth()+1}/${dt.getDate()}</div>
          <div class="cnt">${d.count?`<b>${d.count}</b> 人`:'—'}</div>
        </button>`;}).join('')}</div>
    </div>` : '';
  document.getElementById('owbox').innerHTML = owHtml;

  document.getElementById('content').innerHTML = `
    <div class="kpi-grid" style="margin-bottom:12px;">
      <div class="card kpi"><div class="label">應到人數</div><div class="val">${s.expected}${s.is_non_working?'<span class="nwk">非工作日</span>':''}</div></div>
      <div class="card kpi"><div class="label">出勤率</div><div class="val ok">${s.attendance_rate}%<small>${s.on_duty} 人出勤</small></div></div>
      <div class="card kpi"><div class="label">請假人數</div><div class="val">${s.on_leave_count}</div></div>
      <div class="card kpi"><div class="label">假別分佈</div>${typeChips}</div>
    </div>
    <div class="card">
      <div class="row" style="justify-content:space-between;margin-bottom:6px;">
        <div class="row" style="gap:8px;">
          <b>${groupMode==='dept'?'部門人力':'休假人員'} <span class="muted">今日請假 ${list.length} 人</span></b>
          <select id="groupSel" class="grpsel" title="分組方式">
            <option value="none">不分組</option>
            <option value="dept">依部門</option>
            <option value="type">依假別</option>
          </select>
        </div>
      </div>
      ${listHtml}
    </div>
    ${warnBelow}`;

  document.querySelectorAll('.owday').forEach(b=>b.onclick = ()=>{
    // 藍框立即跟著點擊移動，不等回應（避免「點了沒反應」的感覺）
    document.querySelectorAll('.owday').forEach(x=>x.classList.toggle('sel', x===b));
    cur = new Date(b.dataset.d+'T00:00:00'); load();
  });

  const gs = document.getElementById('groupSel');
  if (gs){ gs.value = groupMode; gs.onchange = ()=>{ groupMode = gs.value; localStorage.setItem('dash_group2', groupMode); render(s); }; }

}

document.getElementById('prev').onclick = ()=>{ cur.setDate(cur.getDate()-7); load(); };
document.getElementById('next').onclick = ()=>{ cur.setDate(cur.getDate()+7); load(); };
document.getElementById('today').onclick = ()=>{ cur = new Date(); load(); };
document.getElementById('date').onchange = (e)=>{ if(e.target.value){ cur = new Date(e.target.value+'T00:00:00'); load(); } };

boot();
</script>
</body>
</html>
