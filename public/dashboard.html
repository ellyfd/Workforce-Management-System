<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>儀表板 · 開發處休假表</title>
<link rel="stylesheet" href="app.css" />
<style>
  .greet h1{ font-size:20px; margin:0; font-weight:600; }
  .greet .sub{ color:var(--muted); font-size:14px; margin-top:2px; }
  .datebar{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:8px; margin:12px 0; box-shadow:var(--shadow); }
  .datebar .dlabel{ flex:1; text-align:center; }
  .datebar input[type=date]{ border:none; }
  .deptcard{ background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 14px; margin-bottom:12px; box-shadow:var(--shadow); display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .deptcard label{ display:inline-flex; align-items:center; gap:5px; font-size:14px; cursor:pointer; }
  .leave-item{ display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
  .leave-item:last-child{ border-bottom:none; }
  .leave-item .nm{ font-weight:600; }
  .leave-item .dp{ color:var(--muted); font-size:14px; }
  .leave-item .sp{ flex:1; }
  .typewrap{ display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
  .warn-item{ display:flex; gap:8px; padding:8px 0; border-bottom:1px solid var(--border); font-size:14px; }
  .warn-item:last-child{ border-bottom:none; }
  .warn-item .nm{ font-weight:600; min-width:72px; }
  .warn-item .rs{ color:#b45309; }
  .nwk{ display:inline-block; background:#f3f4f6; color:var(--muted); font-size:14px; border-radius:6px; padding:1px 8px; margin-left:8px; }
</style>
</head>
<body class="has-shell">
<main class="app-main">
  <div class="greet">
    <h1 id="hello">儀表板</h1>
  </div>

  <div class="datebar">
    <button class="btn sm" id="prev" aria-label="前一天">‹</button>
    <div class="datewrap">
      <span class="dlabel" id="dateText"></span>
      <input type="date" id="date" aria-label="選擇日期" />
    </div>
    <button class="btn sm" id="next" aria-label="後一天">›</button>
    <button class="btn sm" id="today">今天</button>
  </div>

  <div class="deptcard"><span class="muted">部門：</span><span id="deptboxes" class="row" style="gap:14px;"></span></div>

  <div id="content"><div class="status">載入中…</div></div>
</main>

<script src="app.js"></script>
<script>
const { esc } = App;
const PERIOD = { full:'整天', morning:'上午', afternoon:'下午' };
let cur = new Date();
let DEPTSEL = new Set();
let me = null;

// 部門篩選：桌機行內多選；手機收合為下拉
let DEPTS = [];
let deptMenuOpen = false;
const deptMobile = window.matchMedia('(max-width: 560px)');
deptMobile.addEventListener('change', ()=>{ deptMenuOpen = false; renderDeptFilter(); });
document.addEventListener('click', (e)=>{
  if (!deptMenuOpen) return;
  if (e.target.closest && e.target.closest('#deptDrop')) return;
  deptMenuOpen = false;
  const m = document.getElementById('deptMenu'); if (m) m.hidden = true;
});

function pad(n){ return String(n).padStart(2,'0'); }
function ymd(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function dateText(d){ return `${d.getFullYear()}年${pad(d.getMonth()+1)}月${pad(d.getDate())}日（${'日一二三四五六'[d.getDay()]}）`; }
function greetWord(){ const h = new Date().getHours(); return h < 11 ? '早安' : h < 18 ? '午安' : '晚安'; }
function deptName(id){ const d = DEPTS.find(x=>String(x.id)===String(id)); return d ? d.name : ''; }

function renderDeptFilter(){
  const host = document.getElementById('deptboxes');
  if (!DEPTS.length){ host.innerHTML = '<span class="muted">無部門</span>'; return; }
  const boxes = DEPTS.map(d=>
    `<label><input type="checkbox" class="df" value="${esc(d.id)}" ${DEPTSEL.has(String(d.id))?'checked':''}/> ${esc(d.name)}</label>`).join('');
  if (deptMobile.matches){
    const n = DEPTSEL.size;
    const lab = n===0 ? '全部' : (n<=2 ? [...DEPTSEL].map(deptName).filter(Boolean).join('、') : `已選 ${n} 個`);
    host.innerHTML = `<div class="deptdrop" id="deptDrop">`
      + `<button class="btn sm deptbtn" id="deptBtn" aria-expanded="${deptMenuOpen}">${esc(lab)} <span class="caret">▾</span></button>`
      + `<div class="deptmenu" id="deptMenu"${deptMenuOpen?'':' hidden'}>${boxes}`
      + `<div class="foot"><button class="btn sm" id="dfClear">清除</button><button class="btn sm primary" id="dfClose">完成</button></div>`
      + `</div></div>`;
    const dbtn = document.getElementById('deptBtn');
    const dmenu = document.getElementById('deptMenu');
    dbtn.onclick = (e)=>{ e.stopPropagation(); deptMenuOpen = !deptMenuOpen; dmenu.hidden = !deptMenuOpen; dbtn.setAttribute('aria-expanded', deptMenuOpen); };
    const dfx = document.getElementById('dfClose'); if (dfx) dfx.onclick = ()=>{ deptMenuOpen=false; dmenu.hidden=true; dbtn.setAttribute('aria-expanded','false'); };
  } else {
    host.innerHTML = boxes;
  }
  host.querySelectorAll('.df').forEach(c=>c.onchange=()=>{ c.checked?DEPTSEL.add(c.value):DEPTSEL.delete(c.value); if (deptMobile.matches) deptMenuOpen = true; renderDeptFilter(); load(); });
  const dfc = document.getElementById('dfClear'); if (dfc) dfc.onclick=()=>{ DEPTSEL.clear(); if (deptMobile.matches) deptMenuOpen = true; renderDeptFilter(); load(); };
}

async function boot(){
  load(); // 當日資料不依賴身分，最先發出
  // 部門篩選（與儀表板資料並行載入）；桌機行內多選、手機收合為下拉
  fetch(`${App.API_BASE}/api/departments`,{cache:'no-store'}).then(r=>r.json()).then(ds=>{
    DEPTS = ds || []; renderDeptFilter();
  }).catch(()=>{ DEPTS = []; renderDeptFilter(); });
  // 身分由 app.js 提供（含快取），不再自打 /api/me（打招呼用）
  me = (await App.ready).me;
  document.getElementById('hello').textContent = me ? `${greetWord()}，${me.name}！` : `${greetWord()}！`;
}

async function load(){
  document.getElementById('date').value = ymd(cur);
  document.getElementById('dateText').textContent = dateText(cur);
  const c = document.getElementById('content');
  c.innerHTML = '<div class="status">載入中…</div>';
  try {
    const dept = [...DEPTSEL].join(',');
    const r = await fetch(`${App.API_BASE}/api/dashboard?date=${ymd(cur)}${dept?`&dept=${dept}`:''}`, { cache:'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    render(await r.json());
  } catch (e) {
    c.innerHTML = `<div class="status err">讀取失敗：${esc(e.message)}</div>`;
  }
}

function render(s){
  const types = s.by_type || [];
  const typeChips = types.length
    ? `<div class="typewrap">${types.map(t=>`<span class="chip" style="background:${esc(t.color||'#64748b')}">${esc(t.short_name||t.name)} ${t.count}</span>`).join('')}</div>`
    : '<div class="val" style="font-size:16px;color:var(--muted);margin-top:8px;">無請假</div>';

  const list = s.on_leave_list || [];
  const listHtml = list.length
    ? list.map(p=>`<div class="leave-item">
        <div><div class="nm">${esc(p.name)}${p.english_name?` <span class="dp">${esc(p.english_name)}</span>`:''}</div>${p.department?`<div class="dp">${esc(p.department)}</div>`:''}</div>
        <div class="sp"></div>
        <span class="chip" style="background:${esc(p.color||'#64748b')}">${esc(p.label)}${p.period&&p.period!=='full'?`・${PERIOD[p.period]||''}`:''}</span>
      </div>`).join('')
    : '<div class="empty"><div style="margin-top:8px;">今日無休假人員</div></div>';

  const warns = s.warnings || [];
  const warnCard = warns.length ? `
    <div class="card" style="margin-bottom:12px;border-color:#fde68a;">
      <div class="row" style="justify-content:space-between;margin-bottom:6px;"><b>異常請假</b><span class="muted">${warns.length} 筆</span></div>
      ${warns.map(w=>`<div class="warn-item"><span class="nm">${esc(w.name)}</span><span class="rs">${w.reasons.map(esc).join('；')}</span></div>`).join('')}
    </div>` : '';

  document.getElementById('content').innerHTML = `
    <div class="kpi-grid" style="margin-bottom:12px;">
      <div class="card kpi"><div class="label">應到人數</div><div class="val">${s.expected}${s.is_non_working?'<span class="nwk">非工作日</span>':''}</div></div>
      <div class="card kpi"><div class="label">出勤率</div><div class="val ok">${s.attendance_rate}%<small>${s.on_duty} 人出勤</small></div></div>
      <div class="card kpi"><div class="label">請假人數</div><div class="val">${s.on_leave_count}</div></div>
      <div class="card kpi"><div class="label">假別分佈</div>${typeChips}</div>
    </div>
    ${warnCard}
    <div class="card">
      <div class="row" style="justify-content:space-between;margin-bottom:6px;">
        <b>休假人員 <span class="muted">${list.length} 人</span></b>
        ${((me&&me.role==='admin')||App.isAdmin)?'<button class="btn sm" id="dedupe" style="color:#b45309;border-color:#fcd34d;">清理重複記錄</button>':''}
      </div>
      ${listHtml}
    </div>`;

  const dd = document.getElementById('dedupe'); if (dd) dd.onclick = dedupe;
}

async function dedupe(){
  if (!confirm('清理重複的休假記錄(同員工+日期+時段+假別只留一筆)?')) return;
  const r = await App.adminApi('/api/admin/dedupe-leaves', { method:'POST' });
  if (!r.ok){ App.toast('清理失敗（需管理員權限）','err'); return; }
  const d = await r.json();
  alert(`完成,清掉 ${d.removed||0} 筆重複。`);
  load();
}

document.getElementById('prev').onclick = ()=>{ cur.setDate(cur.getDate()-1); load(); };
document.getElementById('next').onclick = ()=>{ cur.setDate(cur.getDate()+1); load(); };
document.getElementById('today').onclick = ()=>{ cur = new Date(); load(); };
document.getElementById('date').onchange = (e)=>{ if(e.target.value){ cur = new Date(e.target.value+'T00:00:00'); load(); } };

boot();
</script>
</body>
</html>
