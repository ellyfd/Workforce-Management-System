<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#2563eb" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="開發處排休表" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icon-180.png" />
<title>休假設定 · 開發處休假表</title>
<link rel="stylesheet" href="app.css" />
<style>
  .swatch{ width:22px; height:22px; border-radius:6px; border:1px solid rgba(0,0,0,.1); display:inline-block; vertical-align:middle; }
  .note{ background:#fffbeb; border:1px solid #fde68a; color:#92400e; font-size:14px; border-radius:8px; padding:8px 10px; margin-bottom:12px; }
  /* 操作改用圖示（✏️ 編輯、🗑️ 刪除），省欄寬 */
  .acts{ white-space:nowrap; text-align:right; }
  .acts .iconbtn{ font-size:18px; line-height:1; }
  .acts .iconbtn.del:hover{ background:#fee2e2; }
  /* 拖曳排序握把 + 順序編號（與部門管理一致） */
  .ord{ white-space:nowrap; }
  .ord .grip{ cursor:grab; color:var(--muted); user-select:none; touch-action:none; font-size:16px; margin-right:6px; }
  .ord .ordn{ color:var(--muted); font-variant-numeric:tabular-nums; }
  .ltrow.dragging{ opacity:.55; background:#eff6ff; }
  /* 計入天數可直接在表格輸入 */
  input.dayv{ width:72px; padding:5px 8px; text-align:right; }
  .short{ display:none; }
  @media (max-width:560px){
    .full{ display:none; } .short{ display:inline; }
    /* 假日篩選列維持單行：用年/月下拉導覽即可，隱藏標題/計數/‹›）*/
    .hohead{ flex-wrap:nowrap; gap:6px; }
    .hohead .filt{ flex:1; flex-wrap:nowrap; gap:6px; min-width:0; }
    .hohead .ttl, .hohead .cnt, .hohead .yrnav{ display:none; }
    .hohead select{ padding:7px 6px; min-width:0; flex:1; }
    .hohead #add{ flex:none; padding:8px 12px; }
    table.data th, table.data td{ padding:8px 8px; }
  }
</style>
</head>
<body class="has-shell">
<main class="app-main">
  <div class="page-head"><h1>休假設定</h1></div>
  <div class="note">假別與假日為全域參考資料，於此頁維護。</div>
  <div class="tabs">
    <button id="tabLt" class="active">假別管理</button>
    <button id="tabHo">假日管理</button>
  </div>
  <div id="panel"><div class="status">載入中…</div></div>
</main>

<script src="app.js"></script>
<script>
const { esc } = App;
let types = [], holidays = [], tab = 'lt';
let holYear = new Date().getFullYear();
let holMonth = ''; // ''＝全部月份（清單顯示篩選，不重新查詢）

/* ── 假別 ── */
async function loadTypes(){
  const r = await App.adminApi('/api/admin/leave-types');
  if (r.status===401){ document.getElementById('panel').innerHTML='<div class="status err">此頁僅限管理員。請在「我的排休 → 切換身分」綁定為管理員帳號。</div>'; return false; }
  types = r.ok ? await r.json() : [];
  return true;
}
function renderLt(){
  const rows = types.map((t,i)=>`
    <tr class="ltrow" data-id="${esc(t.id)}">
      <td class="ord"><span class="grip" title="拖曳調整順序">⋮⋮</span><span class="ordn">${i+1}</span></td>
      <td><span class="swatch" style="background:${esc(t.color||'#64748b')}"></span></td>
      <td><b>${esc(t.name)}</b></td>
      <td><span class="chip" style="background:${esc(t.color||'#64748b')}">${esc(t.short_name||t.name)}</span></td>
      <td><input type="number" step="0.5" min="0" class="dayv" data-id="${esc(t.id)}" value="${Number(t.day_value)||0}" title="計入天數" aria-label="計入天數" /> <span class="muted">天</span></td>
      <td class="acts"><button class="iconbtn" data-edit="${esc(t.id)}" title="編輯" aria-label="編輯">✏️</button><button class="iconbtn del" data-del="${esc(t.id)}" title="刪除" aria-label="刪除">🗑️</button></td>
    </tr>`).join('');
  document.getElementById('panel').innerHTML = `
    <div class="card">
      <div class="row" style="justify-content:space-between;margin-bottom:10px;">
        <b>假別 <span class="muted">（${types.length}）</span></b>
        <button class="btn primary" id="add"><span class="full">＋ 新增假別</span><span class="short">＋</span></button>
      </div>
      <div class="table-wrap"><table class="data">
        <thead><tr><th>順序</th><th>顏色</th><th>名稱</th><th>簡稱</th><th>計入天數</th><th></th></tr></thead>
        <tbody id="ltBody">${rows||'<tr><td colspan="6" class="empty">尚無假別</td></tr>'}</tbody>
      </table></div>
      <div class="muted" style="margin-top:8px;">拖曳左側握把 ⋮⋮ 可調整順序，放開後自動儲存；「計入天數」可直接於欄位輸入（休=1、午休/早休=0.5、出差=0 不計）。</div>
    </div>`;
  document.getElementById('add').onclick = ()=>ltForm();
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>ltForm(types.find(x=>x.id===b.dataset.edit)));
  document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>delLt(b.dataset.del));
  document.querySelectorAll('input.dayv').forEach(inp=>{ inp.onchange=()=>saveDayValue(inp); });
  attachLtDrag();
}

// 計入天數：直接在表格輸入，失焦/變更即儲存
async function saveDayValue(inp){
  const id = inp.dataset.id;
  const t = types.find(x=>x.id===id);
  const v = Number(inp.value);
  if (Number.isNaN(v) || v < 0){ App.toast('計入天數請輸入 0 以上的數字','err'); inp.value = Number(t&&t.day_value)||0; return; }
  const res = await App.adminApi(`/api/admin/leave-types/${id}`,{method:'PUT',body:JSON.stringify({day_value:v})});
  if (!res.ok){ App.toast('儲存失敗','err'); inp.value = Number(t&&t.day_value)||0; return; }
  if (t) t.day_value = v;
  App.toast('已更新計入天數','ok');
}

// 拖曳排序（pointer 事件，滑鼠與觸控通用）：放開後依新順序重設 sort_order
function attachLtDrag(){
  const tbody = document.getElementById('ltBody');
  if (!tbody) return;
  const rowsOf = ()=>[...tbody.querySelectorAll('tr.ltrow')];
  tbody.querySelectorAll('.grip').forEach(grip=>{
    grip.onpointerdown = (e)=>{
      e.preventDefault();
      const tr = grip.closest('tr.ltrow');
      tr.classList.add('dragging');
      const move = (ev)=>{
        const y = ev.clientY;
        for (const r of rowsOf()){
          if (r===tr) continue;
          const rect = r.getBoundingClientRect();
          if (y >= rect.top && y <= rect.bottom){
            tbody.insertBefore(tr, (y > rect.top + rect.height/2) ? r.nextSibling : r);
            break;
          }
        }
      };
      const up = async ()=>{
        document.removeEventListener('pointermove', move);
        document.removeEventListener('pointerup', up);
        tr.classList.remove('dragging');
        const ids = rowsOf().map(r=>r.dataset.id);
        if (ids.join(',') !== types.map(t=>t.id).join(',')) await persistLtOrder(ids);
      };
      document.addEventListener('pointermove', move);
      document.addEventListener('pointerup', up);
    };
  });
}
async function persistLtOrder(ids){
  const byId = Object.fromEntries(types.map(t=>[t.id,t]));
  types = ids.map((id,i)=>{ const t = byId[id]; t.sort_order = (i+1)*10; return t; });
  renderLt(); // 立即反映新順序與編號
  const res = await Promise.all(types.map(t=>App.adminApi(`/api/admin/leave-types/${t.id}`,{method:'PUT',body:JSON.stringify({sort_order:t.sort_order})})));
  if (res.every(r=>r.ok)) App.toast('假別順序已更新','ok');
  else { App.toast('部分順序儲存失敗','err'); await loadTypes(); renderLt(); }
}
function ltForm(t){
  const cur = t || { name:'', short_name:'', color:'#22c55e', sort_order:(types.length+1)*10, day_value:1 };
  modal(`${t?'編輯':'新增'}假別`, `
    <div class="field"><label>名稱</label><input id="l_name" value="${esc(cur.name)}" /></div>
    <div class="field"><label>簡稱（表格上顯示）</label><input id="l_short" value="${esc(cur.short_name||'')}" maxlength="4" /></div>
    <div class="row"><div class="field"><label>顏色</label><input id="l_color" type="color" value="${esc(cur.color||'#22c55e')}" /></div>
    <div class="field" style="flex:1;"><label>計入天數（1＝一天、0.5＝半天、0＝不計）</label><input id="l_dayv" type="number" step="0.5" min="0" value="${Number(cur.day_value)||0}" /></div></div>
    <div class="muted" style="font-size:14px;">新增後可在列表用拖曳調整順序、直接修改計入天數。</div>
  `, async ()=>{
    const name = document.getElementById('l_name').value.trim();
    if (!name){ App.toast('請輸入名稱','err'); return false; }
    const dayv = Number(document.getElementById('l_dayv').value);
    if (Number.isNaN(dayv) || dayv < 0){ App.toast('計入天數請輸入 0 以上的數字','err'); return false; }
    const body = { name, short_name: document.getElementById('l_short').value.trim()||name, color: document.getElementById('l_color').value, sort_order: cur.sort_order??0, day_value: dayv };
    const res = t ? await App.adminApi(`/api/admin/leave-types/${t.id}`,{method:'PUT',body:JSON.stringify(body)})
                  : await App.adminApi('/api/admin/leave-types',{method:'POST',body:JSON.stringify(body)});
    if (!res.ok){ App.toast('儲存失敗','err'); return false; }
    App.toast(t?'已更新假別':'已新增假別','ok');
    await loadTypes(); renderLt(); return true;
  });
}
async function delLt(id){
  const t = types.find(x=>x.id===id);
  if (!await App.confirm(`確定刪除假別「${t?t.name:''}」？`, { title:'刪除假別', okText:'刪除', danger:true })) return;
  const res = await App.adminApi(`/api/admin/leave-types/${id}`,{method:'DELETE'});
  if (!res.ok){ App.toast('刪除失敗','err'); return; }
  App.toast('已刪除','ok');
  await loadTypes(); renderLt();
}

/* ── 假日 ── */
async function loadHols(){
  const r = await App.adminApi(`/api/admin/holidays?year=${holYear}`);
  if (r.status===401){ document.getElementById('panel').innerHTML='<div class="status err">此頁僅限管理員。請在「我的排休 → 切換身分」綁定為管理員帳號。</div>'; return false; }
  holidays = r.ok ? await r.json() : [];
  return true;
}
function hoTag(type){
  return type==='company' ? '<span class="tag green">公司假</span>' : '<span class="tag blue">國定假日</span>';
}
function renderHo(){
  const list = holMonth ? holidays.filter(h=>Number((h.date||'').slice(5,7))===Number(holMonth)) : holidays;
  const rows = list.map(h=>`
    <tr>
      <td><b>${esc((h.date||'').slice(5))}</b> <span class="muted">${'日一二三四五六'[new Date(h.date+'T00:00:00').getDay()]}</span></td>
      <td>${esc(h.name||'')||'<span class="muted">—</span>'}</td>
      <td>${hoTag(h.type)}</td>
      <td class="acts"><button class="iconbtn" data-edit="${esc(h.id)}" title="編輯" aria-label="編輯">✏️</button><button class="iconbtn del" data-del="${esc(h.id)}" title="刪除" aria-label="刪除">🗑️</button></td>
    </tr>`).join('');
  document.getElementById('panel').innerHTML = `
    <div class="card">
      <div class="row hohead" style="justify-content:space-between;margin-bottom:10px;">
        <div class="row filt"><b class="ttl">假日</b>
          <button class="btn sm yrnav" id="py">‹</button>
          <select id="hoYear" title="選擇年度">${App.yearOptions(holYear)}</select>
          <button class="btn sm yrnav" id="ny">›</button>
          <select id="hoMonth" title="篩選月份">${App.monthOptions(holMonth, '全部月份')}</select>
          <span class="muted cnt">（${list.length}）</span>
        </div>
        <button class="btn primary" id="add"><span class="full">＋ 新增假日</span><span class="short">＋</span></button>
      </div>
      <div class="table-wrap"><table class="data">
        <thead><tr><th>日期</th><th>名稱</th><th>類型</th><th></th></tr></thead>
        <tbody>${rows||`<tr><td colspan="4" class="empty">${holMonth?'該月':'本年'}尚無假日</td></tr>`}</tbody>
      </table></div>
      <div class="muted" style="margin-top:8px;">「國定假日」＝政府公告放假日；「公司假」＝公司自訂放假日（例：員工旅遊）。兩者排休時都會自動略過。</div>
    </div>`;
  document.getElementById('py').onclick = async ()=>{ holYear--; await loadHols(); renderHo(); };
  document.getElementById('ny').onclick = async ()=>{ holYear++; await loadHols(); renderHo(); };
  document.getElementById('hoYear').onchange = async (e)=>{ holYear = Number(e.target.value); await loadHols(); renderHo(); };
  document.getElementById('hoMonth').onchange = (e)=>{ holMonth = e.target.value; renderHo(); };
  document.getElementById('add').onclick = ()=>hoForm();
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>hoForm(holidays.find(x=>x.id===b.dataset.edit)));
  document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>delHo(b.dataset.del));
}
function hoForm(h){
  const cur = h || { date:`${holYear}-01-01`, name:'', type:'national' };
  modal(`${h?'編輯':'新增'}假日`, `
    <div class="field"><label>日期</label><input id="h_date" type="date" value="${esc(cur.date)}" /></div>
    <div class="field"><label>名稱（選填）</label><input id="h_name" value="${esc(cur.name||'')}" placeholder="例如：元旦、員工旅遊" /></div>
    <div class="field"><label>類型</label><select id="h_type">
      <option value="national"${cur.type==='company'?'':' selected'}>國定假日</option>
      <option value="company"${cur.type==='company'?' selected':''}>公司假</option>
    </select></div>
  `, async ()=>{
    const date = document.getElementById('h_date').value;
    if (!date){ App.toast('請選日期','err'); return false; }
    const body = { date, name: document.getElementById('h_name').value.trim()||null, type: document.getElementById('h_type').value };
    const res = h ? await App.adminApi(`/api/admin/holidays/${h.id}`,{method:'PUT',body:JSON.stringify(body)})
                  : await App.adminApi('/api/admin/holidays',{method:'POST',body:JSON.stringify(body)});
    if (!res.ok){ App.toast('儲存失敗','err'); return false; }
    App.toast(h?'已更新假日':'已新增假日','ok');
    holYear = Number(date.slice(0,4)); await loadHols(); renderHo(); return true;
  });
}
async function delHo(id){
  if (!await App.confirm('確定刪除此假日？', { title:'刪除假日', okText:'刪除', danger:true })) return;
  const res = await App.adminApi(`/api/admin/holidays/${id}`,{method:'DELETE'});
  if (!res.ok){ App.toast('刪除失敗','err'); return; }
  App.toast('已刪除','ok');
  await loadHols(); renderHo();
}

/* ── 共用 modal ── */
function modal(title, inner, onSave){
  const wrap = document.createElement('div');
  wrap.className = 'modal-scrim';
  wrap.innerHTML = `<div class="modal"><h3>${esc(title)}</h3>${inner}
    <div class="actions"><button class="btn" id="m_cancel">取消</button><button class="btn primary" id="m_save">儲存</button></div></div>`;
  document.body.appendChild(wrap);
  const close = ()=>wrap.remove();
  wrap.querySelector('#m_cancel').onclick = close;
  wrap.onclick = (e)=>{ if(e.target===wrap) close(); };
  wrap.querySelector('#m_save').onclick = async ()=>{ const ok = await onSave(); if (ok!==false) close(); };
}

document.getElementById('tabLt').onclick = async ()=>{ tab='lt'; document.getElementById('tabLt').classList.add('active'); document.getElementById('tabHo').classList.remove('active'); if(await loadTypes()) renderLt(); };
document.getElementById('tabHo').onclick = async ()=>{ tab='ho'; document.getElementById('tabHo').classList.add('active'); document.getElementById('tabLt').classList.remove('active'); if(await loadHols()) renderHo(); };
(async()=>{ if(await loadTypes()) renderLt(); })();
</script>
</body>
</html>
