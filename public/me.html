<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>我的排休 · 開發處休假表</title>
<link rel="stylesheet" href="app.css" />
<style>
  :root{ --border:#e5e7eb; --muted:#6b7280; --bg:#f9fafb; --weekend:#fef2f2; --blue:#2563eb; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:-apple-system,"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif; color:#1f2937; background:var(--bg); }
  .page{ max-width:560px; margin:0 auto; padding:14px; }
  h1{ font-size:20px; margin:0 0 2px; }
  .muted{ color:var(--muted); font-size:13px; }
  .card{ background:#fff; border:1px solid var(--border); border-radius:12px; padding:14px; margin-top:12px; }
  .row{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  button{ font:inherit; cursor:pointer; border-radius:8px; border:1px solid var(--border); background:#fff; padding:7px 12px; }
  button.primary{ background:var(--blue); color:#fff; border-color:var(--blue); }
  select,input[type=text]{ font:inherit; padding:8px 10px; border:1px solid var(--border); border-radius:8px; width:100%; }
  .nav{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin:10px 0; }
  .cal{ display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .cal .wd{ text-align:center; font-size:12px; color:var(--muted); padding:4px 0; }
  .cal .wd.we{ color:#ef4444; }
  .day{ aspect-ratio:1/1; border:1px solid var(--border); border-radius:8px; padding:4px; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; cursor:pointer; background:#fff; position:relative; }
  .day.we{ background:var(--weekend); }
  .day.picking{ outline:2px solid var(--blue); outline-offset:-2px; }
  .day.empty{ visibility:hidden; }
  .day .d{ font-size:12px; color:#374151; align-self:flex-start; }
  .day .chip{ margin-top:auto; margin-bottom:auto; width:100%; border-radius:6px; color:#fff; font-size:12px; font-weight:600; text-align:center; padding:3px 0; }
  .day.half{ justify-content:flex-start; }
  .day .chip.am{ margin-top:2px; margin-bottom:auto; }
  .day .chip.pm{ margin-top:auto; margin-bottom:2px; }
  .summary{ display:flex; flex-wrap:wrap; gap:10px 14px; padding:8px 0; }
  .sumitem{ display:inline-flex; align-items:center; gap:5px; font-size:13px; color:#374151; }
  .sumitem .dot{ width:12px; height:12px; border-radius:4px; display:inline-block; }
  .list{ display:flex; flex-direction:column; gap:6px; }
  .emp{ padding:9px 12px; border:1px solid var(--border); border-radius:8px; cursor:pointer; }
  .emp:hover{ background:#f3f4f6; }
  .status{ color:var(--muted); padding:18px; text-align:center; }
  .err{ color:#b91c1c; }
  .link{ color:var(--blue); cursor:pointer; font-size:13px; background:none; border:none; padding:0; }
  footer{ color:var(--muted); font-size:11px; margin-top:10px; text-align:center; }
</style>
</head>
<body class="has-shell">
<div class="page">
  <div id="app"><div class="status">載入中…</div></div>
  <footer id="footer"></footer>
</div>

<script src="app.js"></script>
<script>
// 由 Worker 一併服務本頁（同源）；可用 ?api=<Worker 網址> 覆蓋。
const API_BASE = (new URLSearchParams(location.search).get('api')
  || 'https://workforcemanagement.ellyfd.workers.dev').replace(/\/+$/, '');

const WEEKDAY = ['日','一','二','三','四','五','六'];

// 取得（或產生）本裝置識別碼
let DEVICE = localStorage.getItem('dev_device_token');
if (!DEVICE) { DEVICE = crypto.randomUUID(); localStorage.setItem('dev_device_token', DEVICE); }

let me = null;
let leaveTypes = [];
let cur = new Date(); // 目前顯示的月份
let myLeaves = {};    // { 'YYYY-MM-DD': {id, leave_type_id, period} }
let selType = '';     // 目前選的假別 id（''＝尚未選）
let rangeMode = false; // 區間請假模式
let rangeStart = null; // 區間起點 date
let holidays = new Set(); // 國定假日（區間略過用）

const app = document.getElementById('app');
const api = (path, opts = {}) => fetch(API_BASE + path, {
  ...opts,
  headers: { 'Content-Type': 'application/json', 'X-Device-Token': DEVICE, ...(opts.headers || {}) },
});

function pad(n){ return String(n).padStart(2,'0'); }
function ymd(y,m,d){ return `${y}-${pad(m)}-${pad(d)}`; }
function colorOf(typeId){ const t = leaveTypes.find(x=>x.id===typeId); return t ? (t.color||'#64748b') : '#64748b'; }
function labelOf(typeId){ const t = leaveTypes.find(x=>x.id===typeId); return t ? (t.short_name||t.name) : '休'; }

async function init(){
  try {
    // 個人連結：me.html?key=英文名 → 自動綁定並帶出本人
    const key = (new URLSearchParams(location.search).get('key') || '').trim();
    const res = await api('/api/me');
    if (res.ok) {
      me = await res.json();
      const k = key.toLowerCase();
      const matched = k && ((me.english_name||'').toLowerCase()===k || (me.name||'')===key);
      if (key && !matched) { if (await bindByKey(key)) return; } // 換成 key 指定的人
    } else if (res.status === 401) {
      if (key) { if (await bindByKey(key)) return; }
      return showLogin();
    } else {
      throw new Error('HTTP ' + res.status);
    }
    leaveTypes = await (await api('/api/leave-types')).json();
    await loadMyLeaves();
    showCalendar();
  } catch (e) {
    app.innerHTML = `<div class="status err">連線失敗：${e.message}<br>請確認 API_BASE 設定正確（目前：${API_BASE}）</div>`;
  }
}

// 用英文名（或中文名）找員工並綁定本裝置；成功會重新 init 並回 true。
async function bindByKey(key){
  const k = key.toLowerCase();
  const emps = await (await api('/api/employees')).json();
  const emp = emps.find(e => (e.english_name||'').toLowerCase()===k)
    || emps.find(e => (e.name||'')===key)
    || emps.find(e => (e.english_name||'').toLowerCase().includes(k));
  if (!emp) return false; // 找不到 → 交回呼叫端處理（顯示清單）
  const r = await api('/api/bind', { method:'POST', body: JSON.stringify({ employee_id: emp.id }) });
  if (!r.ok) return false;
  await init();
  return true;
}

async function showLogin(){
  const emps = await (await api('/api/employees')).json();
  app.innerHTML = `
    <div class="row" style="justify-content:space-between;"><h1>我的排休</h1><a class="link" href="index.html">← 全部排休</a></div>
    <div class="muted">第一次使用：請選擇你自己（會記住這台裝置，下次免選）。</div>
    <div class="card">
      <input id="search" type="text" placeholder="輸入中文名或英文名搜尋…" />
      <div class="list" id="emplist" style="margin-top:10px;"></div>
    </div>`;
  const listEl = document.getElementById('emplist');
  const draw = (kw='') => {
    const k = kw.trim().toLowerCase();
    listEl.innerHTML = '';
    emps.filter(e => !k || (e.name||'').toLowerCase().includes(k) || (e.english_name||'').toLowerCase().includes(k))
      .forEach(e => {
        const el = document.createElement('div');
        el.className = 'emp';
        el.innerHTML = `<b>${e.name}</b> ${e.english_name ? `<span class="muted">${e.english_name}</span>` : ''}`;
        el.onclick = async () => { await bind(e.id); };
        listEl.appendChild(el);
      });
  };
  draw();
  document.getElementById('search').oninput = (ev) => draw(ev.target.value);
}

async function bind(employeeId){
  const res = await api('/api/bind', { method:'POST', body: JSON.stringify({ employee_id: employeeId }) });
  if (!res.ok) { alert('綁定失敗'); return; }
  init();
}

async function loadMyLeaves(){
  const recs = await (await api(`/api/my-leaves?year=${cur.getFullYear()}`)).json();
  myLeaves = {};
  for (const r of recs) myLeaves[r.date] = { id: r.id, leave_type_id: r.leave_type_id, period: r.period || 'full' };
  // 載入該年國定假日（區間請假用來略過）
  try {
    const hs = await (await fetch(`${API_BASE}/api/holidays?year=${cur.getFullYear()}`, { cache:'no-store' })).json();
    holidays = new Set(Array.isArray(hs) ? hs : []);
  } catch (_) { holidays = new Set(); }
}
// 是否為「出差」類假別（出差連週末/假日都算,不略過）
function isBizType(typeId){ return /差/.test(labelOf(typeId)); }

// 由假別簡稱推時段：早→上午、午→下午、否則整天。
function periodOfType(typeId){
  const s = labelOf(typeId);
  if (/早/.test(s)) return 'morning';
  if (/午/.test(s)) return 'afternoon';
  return 'full';
}
function leaveDays(period){ return period==='morning'||period==='afternoon' ? 0.5 : 1; }

function showCalendar(){
  const y = cur.getFullYear(), m = cur.getMonth() + 1;
  const first = new Date(y, m-1, 1).getDay();
  const days = new Date(y, m, 0).getDate();

  const opts = leaveTypes.map(t => `<option value="${t.id}"${t.id===selType?' selected':''}>${t.name}</option>`).join('');

  // 本月假別小計（天數，半天計 0.5）
  const monthPrefix = `${y}-${String(m).padStart(2,'0')}`;
  const sumByType = {};
  for (const [date, lv] of Object.entries(myLeaves)){
    if (!date.startsWith(monthPrefix)) continue;
    sumByType[lv.leave_type_id] = (sumByType[lv.leave_type_id]||0) + leaveDays(lv.period);
  }
  const summary = Object.entries(sumByType).map(([tid,days])=>
    `<span class="sumitem"><span class="dot" style="background:${colorOf(tid)}"></span>${labelOf(tid)} ${days} 天</span>`).join('');

  // 假別圖例
  const legend = leaveTypes.map(t=>`<span class="sumitem"><span class="dot" style="background:${t.color||'#64748b'}"></span>${t.short_name||t.name} = ${t.name}</span>`).join('');

  let cells = '';
  for (let i=0;i<first;i++) cells += `<div class="day empty"></div>`;
  for (let d=1; d<=days; d++){
    const date = ymd(y,m,d);
    const dow = new Date(y, m-1, d).getDay();
    const we = dow===0 || dow===6;
    const lv = myLeaves[date];
    const half = lv && (lv.period==='morning'||lv.period==='afternoon') ? (lv.period==='morning'?' am':' pm') : '';
    const chip = lv ? `<div class="chip${half}" style="background:${colorOf(lv.leave_type_id)}">${labelOf(lv.leave_type_id)}</div>` : '';
    const picking = (rangeStart===date) ? ' picking' : '';
    cells += `<div class="day${we?' we':''}${half?' half':''}${picking}" data-date="${date}"><div class="d">${d}</div>${chip}</div>`;
  }

  app.innerHTML = `
    <div class="row" style="justify-content:space-between;">
      <div><h1>我的排休</h1><div class="muted">${me.name}${me.english_name?`（${me.english_name}）`:''}</div></div>
      <button class="link" id="logout">切換身分</button>
    </div>
    <div class="card">
      <div class="nav">
        <button id="prev">‹ 上個月</button>
        <b>${y} 年 ${m} 月</b>
        <button id="next">下個月 ›</button>
      </div>
      ${summary ? `<div class="summary">${summary}</div>` : '<div class="muted" style="font-size:12px;">本月尚無休假</div>'}
      <div class="row" style="margin:10px 0; gap:8px;">
        <select id="ltype" style="flex:1; min-width:140px;"><option value="">選擇假別…</option>${opts}</select>
        <button id="rangeBtn" class="${rangeMode?'primary':''}" title="區間請假">區間</button>
      </div>
      ${rangeMode ? `<div class="muted" style="font-size:12px; color:var(--blue);">區間模式：${rangeStart?`已選起點 ${rangeStart}，再點結束日`:'點第一天當起點'}</div>` : ''}
      <div class="cal">
        ${WEEKDAY.map((w,i)=>`<div class="wd${i===0||i===6?' we':''}">${w}</div>`).join('')}
        ${cells}
      </div>
      <div class="muted" style="margin-top:10px;">填入：選假別後點日期。取消：雙擊已填入的格子。區間：按「區間」後點起訖兩天。</div>
    </div>
    <div class="card" style="margin-top:12px;">
      <details>
        <summary style="cursor:pointer;font-weight:600;">操作說明與假別圖例</summary>
        <ul class="muted" style="margin:10px 0;padding-left:18px;line-height:1.7;font-size:13px;">
          <li><b>填入請假</b>：先從上方「選擇假別」，再點日曆中的日期即可填入。</li>
          <li><b>取消請假</b>：<b>雙擊</b>已填入的格子，確認後即取消。</li>
          <li><b>區間請假</b>：選好假別後點「區間」進入區間模式，依序點起始日與結束日。</li>
          <li><b>半天假</b>：選「下午休 / 上午休」會以半格顯示、自動計 0.5 天。</li>
        </ul>
        <div style="font-weight:600;margin:6px 0;">假別圖例</div>
        <div class="summary">${legend}</div>
      </details>
    </div>`;

  document.getElementById('logout').onclick = () => { localStorage.removeItem('dev_device_token'); location.reload(); };
  document.getElementById('prev').onclick = async () => { cur = new Date(y, m-2, 1); rangeStart=null; await loadMyLeaves(); showCalendar(); };
  document.getElementById('next').onclick = async () => { cur = new Date(y, m, 1); rangeStart=null; await loadMyLeaves(); showCalendar(); };
  document.getElementById('ltype').onchange = (ev) => { selType = ev.target.value; };
  document.getElementById('rangeBtn').onclick = () => { rangeMode = !rangeMode; rangeStart = null; showCalendar(); };
  app.querySelectorAll('.day[data-date]').forEach(el => {
    el.onclick = () => onCell(el.dataset.date);
    el.ondblclick = () => onCellDbl(el.dataset.date);
  });
}

// 單擊：區間模式選起訖；否則空白格填入（已填入的格子單擊不動作，雙擊才取消）
function onCell(date){
  const lv = myLeaves[date];
  if (rangeMode){
    if (!selType){ alert('請先選擇假別'); return; }
    if (!rangeStart){ rangeStart = date; showCalendar(); return; }
    const a = rangeStart < date ? rangeStart : date;
    const b = rangeStart < date ? date : rangeStart;
    rangeStart = null;
    fillRange(a, b, selType);
    return;
  }
  if (!lv){
    if (!selType){ alert('請先從上方「選擇假別」'); return; }
    addLeave(date, selType);
  }
}

// 雙擊已填入的格子＝取消；若屬一段連續假,問要刪單日還是整段
function onCellDbl(date){
  const lv = myLeaves[date];
  if (!lv) return;
  const run = buildDeleteRange(date);
  if (run){
    const whole = confirm(`這是一段連續 ${run.length} 天的「${labelOf(lv.leave_type_id)}」。\n\n按「確定」＝刪整段 ${run.length} 天；按「取消」＝只刪這一天。`);
    if (whole) deleteIds(run.map(d => myLeaves[d].id));
    else cancelLeave(lv.id);
  } else if (confirm('取消這天的請假？')) {
    cancelLeave(lv.id);
  }
}

// 找出包含 date 的連續同假別區段（往前後掃相鄰日）；長度>1 才回傳日期陣列
function buildDeleteRange(date){
  const lv = myLeaves[date];
  if (!lv) return null;
  const type = lv.leave_type_id;
  const has = (s) => myLeaves[s] && myLeaves[s].leave_type_id === type;
  const dates = [date];
  let d = new Date(date + 'T00:00:00');
  while (true){ d.setDate(d.getDate()-1); const s = ymd(d.getFullYear(), d.getMonth()+1, d.getDate()); if (has(s)) dates.unshift(s); else break; }
  d = new Date(date + 'T00:00:00');
  while (true){ d.setDate(d.getDate()+1); const s = ymd(d.getFullYear(), d.getMonth()+1, d.getDate()); if (has(s)) dates.push(s); else break; }
  return dates.length > 1 ? dates : null;
}
async function deleteIds(ids){
  try {
    const r = await api('/api/my-leaves/delete', { method:'POST', body: JSON.stringify({ ids }) });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    await loadMyLeaves(); showCalendar();
  } catch (e) { alert('刪除失敗：' + e.message); }
}

// 送出前警示：職代當天也請假 / 部門當天達 1/3。出差不檢查。回傳警示字串陣列。
async function warnFor(dates, typeId){
  if (isBizType(typeId) || !dates.length) return [];
  try {
    const r = await fetch(`${API_BASE}/api/leave-check?employee_id=${encodeURIComponent(me.id)}&dates=${dates.join(',')}`, { cache:'no-store' });
    if (!r.ok) return [];
    const data = await r.json();
    const msgs = [];
    for (const d of dates){
      const w = data.results[d]; if (!w) continue;
      if (w.deputies && w.deputies.length) msgs.push(`${d}：職代 ${w.deputies.join('、')} 當天也請假`);
      if (w.over) msgs.push(`${d}：部門當天請假已達 1/3（已 ${w.dept_count} 人）`);
    }
    return msgs;
  } catch (_) { return []; }
}

async function addLeave(date, typeId){
  const w = await warnFor([date], typeId);
  if (w.length && !confirm('注意：\n' + w.join('\n') + '\n\n仍要請假嗎？')) return;
  try {
    await api('/api/my-leaves', { method:'POST', body: JSON.stringify({ date, leave_type_id: typeId, period: periodOfType(typeId) }) });
    await loadMyLeaves(); showCalendar();
  } catch (e) { alert('操作失敗：' + e.message); }
}
async function cancelLeave(id){
  try {
    await api(`/api/my-leaves/${id}`, { method:'DELETE' });
    await loadMyLeaves(); showCalendar();
  } catch (e) { alert('操作失敗：' + e.message); }
}
async function fillRange(startDate, endDate, typeId){
  const period = periodOfType(typeId);
  const biz = isBizType(typeId); // 出差不略過週末/假日
  const items = [];
  const d = new Date(startDate + 'T00:00:00'), end = new Date(endDate + 'T00:00:00');
  for (; d <= end; d.setDate(d.getDate()+1)){
    const dow = d.getDay();
    const date = ymd(d.getFullYear(), d.getMonth()+1, d.getDate());
    if (!biz && (dow===0 || dow===6 || holidays.has(date))) continue; // 略過週末/國定假日
    items.push({ date, leave_type_id: typeId, period });
  }
  if (!items.length) { alert('此區間內沒有可請假的日子（週末/假日已略過）。'); return; }
  const w = await warnFor(items.map(i => i.date), typeId);
  if (w.length && !confirm('注意：\n' + w.join('\n') + '\n\n仍要送出區間請假嗎？')) return;
  try {
    const r = await api('/api/my-leaves/bulk', { method:'POST', body: JSON.stringify({ items }) });
    if (!r.ok) throw new Error('HTTP ' + r.status);
  } catch (e) { alert('區間請假失敗：' + e.message); }
  await loadMyLeaves(); showCalendar();
}

init();
</script>
</body>
</html>
