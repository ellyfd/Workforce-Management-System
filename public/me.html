<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#2563eb" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="開發處休假表" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icon-180.png" />
<title>我的排休 · 開發處休假表</title>
<link rel="stylesheet" href="app.css" />
<style>
  /* 行事曆專用；其餘元件吃共用 app.css 以維持各頁一致 */
  .app-main{ max-width:680px; }
  .cal{ display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .cal .wd{ text-align:center; font-size:14px; color:var(--muted); padding:4px 0; }
  .cal .wd.we{ color:var(--red); }
  .day{ aspect-ratio:1/1; min-width:0; overflow:hidden; border:1px solid var(--border); border-radius:8px; padding:4px; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; cursor:pointer; background:#fff; position:relative; }
  .day.we{ background:var(--weekend); }
  .day.holiday{ background:var(--holiday); }
  /* 日期數字與假日名稱同一行：名稱靠右、縮小、過長截斷（完整名稱看 tooltip），把格子主體讓給假別色塊，避免假日名稱壓到色塊 */
  .day .dtop{ display:flex; align-items:baseline; justify-content:space-between; gap:4px; width:100%; }
  .day .hol{ font-size:11px; line-height:1.2; color:var(--red); flex:1; min-width:0; text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .day.holiday.company{ background:#dcfce7; }
  .day.holiday.company .hol{ color:#15803d; }
  .day.picking{ outline:2px solid var(--blue); outline-offset:-2px; }
  .day.empty{ visibility:hidden; }
  .day .d{ font-size:14px; color:#374151; flex:none; }
  /* 假別色塊：全天＝置中色帶、半天＝只佔上半(早休)或下半(午休)。清楚分辨又不過於厚重 */
  .day .dbody{ flex:1; min-height:0; width:100%; display:flex; flex-direction:column; justify-content:center; gap:2px; margin-top:3px; }
  .day .dbody .chip{ flex:0 0 auto; height:74%; display:flex; align-items:center; justify-content:center; width:100%; border-radius:6px; color:#fff; font-size:13px; font-weight:500; text-align:center; padding:0 2px; white-space:nowrap; overflow:hidden; }
  .day .dbody.half{ justify-content:flex-start; }
  .day .dbody.half .chip{ height:calc(50% - 1px); }
  .day .dbody.half .chip.am{ margin-bottom:auto; }
  .day .dbody.half .chip.pm{ margin-top:auto; }
  .cal-nav{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin:10px 0; }
  .summary{ display:flex; flex-wrap:wrap; gap:10px 14px; padding:8px 0; }
  .sumitem{ display:inline-flex; align-items:center; gap:5px; font-size:14px; color:#374151; }
  .sumitem .dot{ width:12px; height:12px; border-radius:4px; display:inline-block; }
  .list{ display:flex; flex-direction:column; gap:6px; }
  .emp{ padding:9px 12px; border:1px solid var(--border); border-radius:8px; cursor:pointer; }
  .emp:hover{ background:#f3f4f6; }
  /* 假別筆刷：桌機用色票 chip，手機改用下拉 */
  .lchips{ display:flex; flex-wrap:wrap; gap:6px; flex:1; align-content:flex-start; }
  .lchip{ box-sizing:border-box; min-width:54px; text-align:center; border:1.5px solid var(--c); color:var(--c); background:#fff; border-radius:999px; padding:5px 10px; font-size:13px; font-weight:600; cursor:pointer; line-height:1.2; transition:background .12s, color .12s; }
  .lchip:hover{ background:#f8fafc; }
  .lchip.on{ background:var(--c); color:#fff; }
  .lsel{ display:none; }
  /* 目前筆刷的即時提示，引導「先選假別→再點日期」 */
  .hint{ margin:8px 0 2px; font-size:14px; color:#374151; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .hint .dot{ width:12px; height:12px; border-radius:4px; display:inline-block; }
  .hint .step{ color:var(--blue); font-weight:600; }
  /* 第一次登入的互動式教學（聚光燈 + 步驟卡） */
  .tour-mask{ position:fixed; inset:0; z-index:299; }
  .tour-spot{ position:fixed; border-radius:10px; box-shadow:0 0 0 9999px rgba(15,23,42,.55); z-index:300; pointer-events:none; transition:left .2s,top .2s,width .2s,height .2s; }
  .tour-card{ position:fixed; z-index:301; box-sizing:border-box; width:300px; max-width:calc(100vw - 24px); background:#fff; border-radius:12px; box-shadow:0 12px 40px rgba(0,0,0,.28); padding:16px; font-size:14px; line-height:1.6; color:#374151; }
  .tour-card h4{ margin:0 0 6px; font-size:15px; color:#111827; }
  .tour-card .tnav{ display:flex; justify-content:space-between; align-items:center; margin-top:14px; gap:8px; }
  .tour-card .tdots{ display:flex; gap:5px; }
  .tour-card .tdots i{ width:7px; height:7px; border-radius:50%; background:var(--border); display:inline-block; }
  .tour-card .tdots i.on{ background:var(--blue); }
  .tour-card .tbtns{ display:flex; gap:8px; }

  /* 手機：縮小日曆格內距與字級，避免色塊溢出格子 */
  @media (max-width:560px){
    .app-main{ padding-left:8px; padding-right:8px; }
    .card{ padding:12px; }
    .cal{ gap:3px; }
    .day{ padding:2px; border-radius:6px; overflow:hidden; }
    .day .d{ font-size:12px; }
    .day .hol{ font-size:10px; margin-top:0; }
    .day .dbody{ margin-top:2px; }
    .day .dbody .chip{ font-size:11px; border-radius:4px; }
    .cal .wd{ font-size:12px; padding:2px 0; }
    .summary{ gap:6px 10px; }
    .sumitem{ font-size:13px; }
    .cal-nav b{ font-size:14px; }
    /* 手機：隱藏 chip、改用下拉 */
    .lchips{ display:none; }
    .lsel{ display:block; flex:1; min-width:140px; }
  }
</style>
</head>
<body class="has-shell">
<main class="app-main">
  <div id="app"><div class="status">載入中…</div></div>
</main>

<script src="app.js"></script>
<script>
// 由 Worker 一併服務本頁（同源）；可用 ?api=<Worker 網址> 覆蓋。
const API_BASE = (new URLSearchParams(location.search).get('api')
  || 'https://workforcemanagement.ellyfd.workers.dev').replace(/\/+$/, '');

const WEEKDAY = ['日','一','二','三','四','五','六'];

// 取得（或產生）本裝置識別碼
let DEVICE = localStorage.getItem('dev_device_token');
if (!DEVICE) { DEVICE = crypto.randomUUID(); localStorage.setItem('dev_device_token', DEVICE); }

let me = null;
let leaveTypes = [];
let cur = new Date(); // 目前顯示的月份
let myLeaves = {};    // { 'YYYY-MM-DD': {id, leave_type_id, period} }
let selType = '';     // 目前選的假別 id（''＝尚未選）
let rangeMode = false; // 區間請假模式
let rangeStart = null; // 區間起點 date
let holidays = new Set(); // 假日日期（區間略過用）
let holidayMap = {};      // 日期→假日名稱（顯示用，含國定/公司假日）
let holidayTypes = {};    // 日期→類型（national 國定 / company 公司假）

const app = document.getElementById('app');
const api = (path, opts = {}) => fetch(API_BASE + path, {
  ...opts,
  headers: { 'Content-Type': 'application/json', 'X-Device-Token': DEVICE, ...(opts.headers || {}) },
});

function pad(n){ return String(n).padStart(2,'0'); }
function ymd(y,m,d){ return `${y}-${pad(m)}-${pad(d)}`; }
function colorOf(typeId){ const t = leaveTypes.find(x=>x.id===typeId); return t ? (t.color||'#64748b') : '#64748b'; }
function labelOf(typeId){ const t = leaveTypes.find(x=>x.id===typeId); return t ? (t.short_name||t.name) : '休'; }

async function init(){
  try {
    // 個人連結：me.html?key=英文名 → 自動綁定並帶出本人
    const key = (new URLSearchParams(location.search).get('key') || '').trim();
    // 與 /api/me 並行預抓，省下串行往返；改走綁定流程時，過期結果由世代防護作廢
    const pTypes = api('/api/leave-types').then(r => r.json());
    const pLeaves = loadMyLeaves();
    const res = await api('/api/me');
    if (res.ok) {
      me = await res.json();
      const k = key.toLowerCase();
      const matched = k && ((me.english_name||'').toLowerCase()===k || (me.name||'')===key);
      if (key && !matched) { if (await bindByKey(key)) return; } // 換成 key 指定的人
    } else if (res.status === 401) {
      if (key) { if (await bindByKey(key)) return; }
      return showLogin();
    } else {
      throw new Error('HTTP ' + res.status);
    }
    leaveTypes = await pTypes;
    await pLeaves;
    showCalendar();
    if (!localStorage.getItem(TOUR_KEY)) setTimeout(startTour, 300); // 第一次登入才跑教學
  } catch (e) {
    app.innerHTML = `<div class="status err">連線失敗：${e.message}<br>請確認 API_BASE 設定正確（目前：${API_BASE}）</div>`;
  }
}

// 用英文名（或中文名）找員工並綁定本裝置；成功會重新 init 並回 true。
async function bindByKey(key){
  const k = key.toLowerCase();
  const emps = await (await api('/api/employees')).json();
  const emp = emps.find(e => (e.english_name||'').toLowerCase()===k)
    || emps.find(e => (e.name||'')===key)
    || emps.find(e => (e.english_name||'').toLowerCase().includes(k));
  if (!emp) return false; // 找不到 → 交回呼叫端處理（顯示清單）
  const r = await api('/api/bind', { method:'POST', body: JSON.stringify({ employee_id: emp.id }) });
  if (!r.ok) return false;
  sessionStorage.removeItem('dev_me_cache'); // 身分變更 → 作廢側欄快取
  await init();
  return true;
}

async function showLogin(){
  const emps = await (await api('/api/employees')).json();
  app.innerHTML = `
    <div class="row" style="justify-content:space-between;"><h1>我的排休</h1><a class="link" href="index.html">← 全部排休</a></div>
    <div class="muted">第一次使用：請選擇你自己（會記住這台裝置，下次免選）。</div>
    <div class="card">
      <input id="search" type="text" placeholder="輸入中文名或英文名搜尋…" />
      <div class="list" id="emplist" style="margin-top:10px;"></div>
    </div>`;
  const listEl = document.getElementById('emplist');
  const draw = (kw='') => {
    const k = kw.trim().toLowerCase();
    listEl.innerHTML = '';
    emps.filter(e => !k || (e.name||'').toLowerCase().includes(k) || (e.english_name||'').toLowerCase().includes(k))
      .forEach(e => {
        const el = document.createElement('div');
        el.className = 'emp';
        el.innerHTML = `<b>${e.name}</b> ${e.english_name ? `<span class="muted">${e.english_name}</span>` : ''}`;
        el.onclick = async () => { await bind(e.id); };
        listEl.appendChild(el);
      });
  };
  draw();
  document.getElementById('search').oninput = (ev) => draw(ev.target.value);
}

async function bind(employeeId){
  const res = await api('/api/bind', { method:'POST', body: JSON.stringify({ employee_id: employeeId }) });
  if (!res.ok) { App.toast('綁定失敗','err'); return; }
  sessionStorage.removeItem('dev_me_cache'); // 身分變更 → 作廢側欄快取
  init();
}

let leavesGen = 0; // 世代計數：重新載入/重新綁定時，讓較舊的回應作廢
async function loadMyLeaves(){
  const gen = ++leavesGen;
  const y = cur.getFullYear();
  // 我的休假 + 該年假日（國定 + 公司假日如員工旅遊）並行載入；未綁定時(401)視為無資料
  const [recs, hs] = await Promise.all([
    api(`/api/my-leaves?year=${y}`).then(r => r.ok ? r.json() : []),
    fetch(`${API_BASE}/api/holidays?year=${y}&names=1`, { cache:'no-store' }).then(r => r.json()).catch(() => []),
  ]);
  if (gen !== leavesGen) return; // 期間已發出更新的載入 → 丟棄這批
  myLeaves = {}; // { date: { full?/am?/pm?: {id,leave_type_id,period} } }
  for (const r of recs){
    const slot = r.period==='morning' ? 'am' : r.period==='afternoon' ? 'pm' : 'full';
    (myLeaves[r.date] ||= {})[slot] = { id: r.id, leave_type_id: r.leave_type_id, period: r.period || 'full' };
  }
  holidays = new Set((hs||[]).map(h => h.date));
  holidayMap = {}; holidayTypes = {};
  (hs||[]).forEach(h => { holidayMap[h.date] = h.name; holidayTypes[h.date] = h.type || 'national'; });
}
// 是否為「出差」類假別（出差連週末/假日都算,不略過）
function isBizType(typeId){ return /差/.test(labelOf(typeId)); }

// 由假別簡稱推時段：早→上午、午→下午、否則整天。
function periodOfType(typeId){
  const s = labelOf(typeId);
  if (/早/.test(s)) return 'morning';
  if (/午/.test(s)) return 'afternoon';
  return 'full';
}
function leaveDays(period){ return period==='morning'||period==='afternoon' ? 0.5 : 1; }

// 計算本月日曆格、本月小計與區間提示 HTML（整頁渲染與局部更新共用）
function buildMonth(){
  const y = cur.getFullYear(), m = cur.getMonth() + 1;
  const first = new Date(y, m-1, 1).getDay();
  const days = new Date(y, m, 0).getDate();
  // 本月假別小計（天數，半天計 0.5）
  const monthPrefix = `${y}-${String(m).padStart(2,'0')}`;
  const sumByType = {};
  for (const [date, slots] of Object.entries(myLeaves)){
    if (!date.startsWith(monthPrefix)) continue;
    for (const lv of Object.values(slots)) sumByType[lv.leave_type_id] = (sumByType[lv.leave_type_id]||0) + leaveDays(lv.period);
  }
  // 年度累計：依各假別在「休假設定」的計入天數(day_value)加總（例：休=1、午休/早休=0.5、出差=0）
  const dayValueOf = (tid)=>{ const t = leaveTypes.find(x=>x.id===tid); return t ? (Number(t.day_value)||0) : 0; };
  let yearTot = 0;
  for (const slots of Object.values(myLeaves)){ for (const lv of Object.values(slots)) yearTot += dayValueOf(lv.leave_type_id); }
  const summary = Object.entries(sumByType).map(([tid,days])=>
    `<span class="sumitem"><span class="dot" style="background:${colorOf(tid)}"></span>${labelOf(tid)} ${days} 天</span>`).join('')
    + `<span class="sumitem"><b>${y} 年累計休假 ${yearTot} 天</b></span>`;

  let cells = '';
  for (let i=0;i<first;i++) cells += `<div class="day empty"></div>`;
  for (let d=1; d<=days; d++){
    const date = ymd(y,m,d);
    const dow = new Date(y, m-1, d).getDay();
    const we = dow===0 || dow===6;
    const slots = myLeaves[date];
    const hol = holidayMap[date];
    const picking = (rangeStart===date) ? ' picking' : '';
    let chip = '', halfCls = '';
    if (slots){
      if (slots.full){
        chip = `<div class="chip" style="background:${colorOf(slots.full.leave_type_id)}">${labelOf(slots.full.leave_type_id)}</div>`;
      } else {
        // 半天：早休＝上半、午休＝下半（可並存）
        halfCls = ' half';
        if (slots.am) chip += `<div class="chip am" style="background:${colorOf(slots.am.leave_type_id)}">${labelOf(slots.am.leave_type_id)}</div>`;
        if (slots.pm) chip += `<div class="chip pm" style="background:${colorOf(slots.pm.leave_type_id)}">${labelOf(slots.pm.leave_type_id)}</div>`;
      }
    }
    const holHtml = hol ? `<div class="hol" title="${hol}">${hol}</div>` : '';
    const holCls = hol ? ' holiday' + (holidayTypes[date]==='company' ? ' company' : '') : '';
    const body = chip ? `<div class="dbody${halfCls}">${chip}</div>` : '';
    cells += `<div class="day${we?' we':''}${holCls}${picking}" data-date="${date}"><div class="dtop"><span class="d">${d}</span>${holHtml}</div>${body}</div>`;
  }
  const calHtml = `${WEEKDAY.map((w,i)=>`<div class="wd${i===0||i===6?' we':''}">${w}</div>`).join('')}${cells}`;
  const summaryHtml = summary ? `<div class="summary" id="monthSummary">${summary}</div>` : '<div class="muted" id="monthSummary" style="font-size:14px;">本月尚無休假</div>';
  const rangeHtml = `<div id="rangeHint">${rangeMode ? `<div class="muted" style="font-size:14px; color:var(--blue);">區間模式：${rangeStart?`已選起點 ${rangeStart}，再點結束日`:'點第一天當起點'}</div>` : ''}</div>`;
  return { calHtml, summaryHtml, rangeHtml };
}

function attachCellHandlers(){
  app.querySelectorAll('.day[data-date]').forEach(el => {
    el.onclick = () => onCell(el.dataset.date);
    el.ondblclick = (ev) => onCellDbl(el.dataset.date, ev);
  });
}

// 編輯後只局部重畫日曆格、本月小計與區間提示，不重建整頁 → 不閃爍
function refreshMonth(){
  const calEl = app.querySelector('.cal');
  if (!calEl){ showCalendar(); return; }
  const { calHtml, summaryHtml, rangeHtml } = buildMonth();
  calEl.innerHTML = calHtml;
  const ms = document.getElementById('monthSummary'); if (ms) ms.outerHTML = summaryHtml;
  const rh = document.getElementById('rangeHint'); if (rh) rh.outerHTML = rangeHtml;
  attachCellHandlers();
}

// 目前筆刷的即時提示：未選→引導先選假別；已選→顯示目前假別並提示點日期、雙擊取消
function brushHintHtml(){
  if (!selType) return `<div class="hint" id="brushHint"><span class="step">①</span> 先選假別 <span class="step">②</span> 再點日期填入</div>`;
  const t = leaveTypes.find(x => x.id === selType);
  const nm = t ? t.name : '';
  const col = t ? (t.color || '#64748b') : '#64748b';
  return `<div class="hint" id="brushHint">目前筆刷：<span class="dot" style="background:${col}"></span><b>${nm}</b>　·　點日期填入，雙擊取消</div>`;
}

// 設定目前選的假別「筆刷」，同步更新 chip 高亮、下拉值與即時提示（共用 selType）
function setSelType(v){
  selType = v;
  document.querySelectorAll('.lchip').forEach(c => c.classList.toggle('on', c.dataset.t === v));
  const sel = document.getElementById('ltype'); if (sel && sel.value !== v) sel.value = v;
  const bh = document.getElementById('brushHint'); if (bh) bh.outerHTML = brushHintHtml();
}

// 第一次登入的互動式教學：聚光燈逐步介紹「① 選假別 → ② 點日期 → 取消」
// 步驟同時是「說明」的文字來源（showCalendar 會列出文字版），改這裡兩邊一起更新。
const TOUR_KEY = 'dev_me_tour_done';
const TOUR_STEPS = [
  { sel:'#brushRow', title:'① 選假別', body:'先點一個假別當「筆刷」（電腦是色塊、手機是下拉選單）。' },
  { sel:'.cal', title:'② 點日期填入', body:'點日曆上的日期，就會填入剛剛選的假別。' },
  { sel:'.cal', title:'取消請假', body:'雙擊已填入的格子，確認後即可取消。' },
  { sel:'#rangeBtn', title:'區間請假', body:'想一次填一整段，先按「區間」再點起訖兩天。' },
];
function startTour(){
  const steps = TOUR_STEPS;
  if (document.querySelector('.tour-mask')) return; // 避免重複開啟
  let i = 0;
  const mask = document.createElement('div'); mask.className = 'tour-mask';
  const spot = document.createElement('div'); spot.className = 'tour-spot';
  const card = document.createElement('div'); card.className = 'tour-card';
  document.body.append(mask, spot, card);
  const cleanup = ()=>{ mask.remove(); spot.remove(); card.remove(); window.removeEventListener('resize', render); window.removeEventListener('scroll', render, true); };
  const finish = ()=>{ try{ localStorage.setItem(TOUR_KEY,'1'); }catch(_){ } cleanup(); };
  function render(){
    const st = steps[i];
    const el = document.querySelector(st.sel);
    if (!el){ finish(); return; }
    const r = el.getBoundingClientRect(), pad = 6;
    spot.style.left = (r.left-pad)+'px'; spot.style.top = (r.top-pad)+'px';
    spot.style.width = (r.width+pad*2)+'px'; spot.style.height = (r.height+pad*2)+'px';
    const last = i === steps.length-1;
    card.innerHTML = `<h4>${st.title}</h4><div>${st.body}</div>
      <div class="tnav">
        <div class="tdots">${steps.map((_,k)=>`<i class="${k===i?'on':''}"></i>`).join('')}</div>
        <div class="tbtns">
          <button class="btn sm" data-act="skip">略過</button>
          ${i>0?'<button class="btn sm" data-act="prev">上一步</button>':''}
          <button class="btn sm primary" data-act="next">${last?'開始使用':'下一步'}</button>
        </div>
      </div>`;
    const ch = card.offsetHeight, cw = card.offsetWidth;
    let top = r.bottom + 12;
    if (top + ch > window.innerHeight - 12) top = Math.max(12, r.top - 12 - ch);
    let left = Math.max(12, Math.min(r.left, window.innerWidth - cw - 12));
    card.style.top = top+'px'; card.style.left = left+'px';
    card.querySelectorAll('[data-act]').forEach(b=>b.onclick=()=>{
      const a = b.dataset.act;
      if (a==='skip') return finish();
      if (a==='prev'){ i--; render(); return; }
      if (last) return finish();
      i++; goto();
    });
  }
  function goto(){ const el = document.querySelector(steps[i].sel); if (el) el.scrollIntoView({ block:'center' }); render(); }
  goto();
  window.addEventListener('resize', render);
  window.addEventListener('scroll', render, true);
}

function showCalendar(){
  const y = cur.getFullYear(), m = cur.getMonth() + 1;
  const opts = leaveTypes.map(t => `<option value="${t.id}"${t.id===selType?' selected':''}>${t.name}</option>`).join('');
  // 桌機用色票 chip 當「筆刷」，選中的高亮；手機沿用下拉
  const chips = leaveTypes.map(t => `<button class="lchip${t.id===selType?' on':''}" data-t="${t.id}" style="--c:${t.color||'#64748b'}">${t.short_name||t.name}</button>`).join('');
  const { calHtml, summaryHtml, rangeHtml } = buildMonth();

  app.innerHTML = `
    <div class="page-head">
      <h1>我的排休</h1>
      <div class="sub">${me.name}${me.english_name?`（${me.english_name}）`:''}</div>
    </div>
    <div class="card">
      <div class="cal-nav">
        <button class="btn sm" id="prev">‹ 上個月</button>
        <span class="row" style="gap:6px;">
          <select id="selYear" title="選擇年度">${App.yearOptions(y)}</select>
          <select id="selMonth" title="選擇月份">${App.monthOptions(m)}</select>
        </span>
        <button class="btn sm" id="next">下個月 ›</button>
      </div>
      ${summaryHtml}
      <div class="row" id="brushRow" style="margin:10px 0; gap:8px;">
        <div class="lchips">${chips}</div>
        <select id="ltype" class="lsel"><option value="">選擇假別…</option>${opts}</select>
        <button class="btn ${rangeMode?'primary':''}" id="rangeBtn" title="區間請假">區間</button>
      </div>
      ${rangeHtml}
      ${brushHintHtml()}
      <div class="cal">${calHtml}</div>
    </div>
    <div class="card" style="margin-top:12px;">
      <details>
        <summary style="cursor:pointer;font-weight:600;">操作說明</summary>
        <ul class="muted" style="margin:10px 0;padding-left:18px;line-height:1.7;font-size:14px;">
          ${TOUR_STEPS.map(s=>`<li><b>${s.title}</b>：${s.body}</li>`).join('')}
        </ul>
        <button class="btn sm" id="replayTour">▶ 重看操作教學</button>
      </details>
    </div>`;

  document.getElementById('prev').onclick = async () => { cur = new Date(y, m-2, 1); rangeStart=null; await loadMyLeaves(); showCalendar(); };
  document.getElementById('next').onclick = async () => { cur = new Date(y, m, 1); rangeStart=null; await loadMyLeaves(); showCalendar(); };
  const ymJump = async () => {
    const y2 = Number(document.getElementById('selYear').value), m2 = Number(document.getElementById('selMonth').value);
    cur = new Date(y2, m2-1, 1); rangeStart = null; await loadMyLeaves(); showCalendar();
  };
  document.getElementById('selYear').onchange = ymJump;
  document.getElementById('selMonth').onchange = ymJump;
  document.getElementById('ltype').onchange = (ev) => setSelType(ev.target.value);
  document.querySelectorAll('.lchip').forEach(c => c.onclick = () => setSelType(c.dataset.t));
  const rt = document.getElementById('replayTour'); if (rt) rt.onclick = startTour;
  document.getElementById('rangeBtn').onclick = () => { rangeMode = !rangeMode; rangeStart = null; document.getElementById('rangeBtn').classList.toggle('primary', rangeMode); refreshMonth(); };
  attachCellHandlers();
}

function slotOf(period){ return period==='morning'?'am':period==='afternoon'?'pm':'full'; }
// 單擊：區間模式選起訖；否則填入(該時段空白才填,雙擊才取消)
function onCell(date){
  const slots = myLeaves[date];
  if (rangeMode){
    if (!selType){ App.toast('請先選擇假別','err'); return; }
    if (!rangeStart){ rangeStart = date; refreshMonth(); return; }
    const a = rangeStart < date ? rangeStart : date;
    const b = rangeStart < date ? date : rangeStart;
    rangeStart = null;
    fillRange(a, b, selType);
    return;
  }
  if (!selType){ if (slots) return; App.toast('請先從上方「選擇假別」','err'); return; } // 已有假→不提示,雙擊取消
  const slot = slotOf(periodOfType(selType));
  if (slots && slots[slot]) return; // 該時段已有→不重複(取消請雙擊)
  addLeave(date, selType);
}

// 三選一對話框（系統樣式、置中），回傳所按按鈕的 value；點背景＝null
function confirmChoice(message, buttons){
  return new Promise(resolve=>{
    const wrap = document.createElement('div');
    wrap.className = 'modal-scrim';
    wrap.innerHTML = `<div class="modal"><h3>確認</h3>`
      + `<p style="margin:0 0 16px;white-space:pre-wrap;line-height:1.6;">${App.esc(message)}</p>`
      + `<div class="actions">${buttons.map((b,i)=>`<button class="btn ${b.danger?'danger':(b.primary?'primary':'')}" data-i="${i}">${App.esc(b.label)}</button>`).join('')}</div></div>`;
    document.body.appendChild(wrap);
    const done = (v)=>{ wrap.remove(); resolve(v); };
    wrap.querySelectorAll('button[data-i]').forEach(btn=>btn.onclick=()=>done(buttons[+btn.dataset.i].value));
    wrap.onclick = (e)=>{ if (e.target===wrap) done(null); };
  });
}
// 雙擊取消；半天依滑鼠 Y 座標決定刪上午/下午;整天若屬連續段問刪單日/整段
async function onCellDbl(date, ev){
  const slots = myLeaves[date];
  if (!slots) return;
  if (slots.full){
    const lv = slots.full;
    const run = buildDeleteRange(date);
    if (run){
      const v = await confirmChoice(`這是一段連續 ${run.length} 天的「${labelOf(lv.leave_type_id)}」，要怎麼取消？`, [
        { label:`刪整段 ${run.length} 天`, value:'whole', danger:true },
        { label:'只刪這一天', value:'one' },
        { label:'保留', value:null },
      ]);
      if (v==='whole') deleteIds(run.map(d => myLeaves[d].full.id));
      else if (v==='one') cancelLeave(lv.id);
    } else if (await App.confirm('取消這天的請假？', { title:'取消請假', danger:true })) cancelLeave(lv.id);
    return;
  }
  // 半天:依點擊上/下半挑 am/pm
  let target = slots.am || slots.pm;
  if (slots.am && slots.pm && ev){ const r = ev.target.closest('.day').getBoundingClientRect(); target = (ev.clientY < r.top + r.height/2) ? slots.am : slots.pm; }
  if (target && await App.confirm('取消這筆請假？', { title:'取消請假', danger:true })) cancelLeave(target.id);
}

// 連續同「整天假別」區段(往前後掃相鄰日);長度>1 才回傳
function buildDeleteRange(date){
  const cur0 = myLeaves[date] && myLeaves[date].full;
  if (!cur0) return null;
  const type = cur0.leave_type_id;
  const has = (s) => myLeaves[s] && myLeaves[s].full && myLeaves[s].full.leave_type_id === type;
  const dates = [date];
  let d = new Date(date + 'T00:00:00');
  while (true){ d.setDate(d.getDate()-1); const s = ymd(d.getFullYear(), d.getMonth()+1, d.getDate()); if (has(s)) dates.unshift(s); else break; }
  d = new Date(date + 'T00:00:00');
  while (true){ d.setDate(d.getDate()+1); const s = ymd(d.getFullYear(), d.getMonth()+1, d.getDate()); if (has(s)) dates.push(s); else break; }
  return dates.length > 1 ? dates : null;
}
async function deleteIds(ids){
  try {
    const r = await api('/api/my-leaves/delete', { method:'POST', body: JSON.stringify({ ids }) });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    await loadMyLeaves(); refreshMonth();
  } catch (e) { App.toast('刪除失敗：' + e.message,'err'); }
}

// 送出前警示：職代當天也請假 / 部門當天達 1/3。出差不檢查。回傳警示字串陣列。
async function warnFor(dates, typeId){
  if (isBizType(typeId) || !dates.length) return [];
  try {
    const r = await fetch(`${API_BASE}/api/leave-check?employee_id=${encodeURIComponent(me.id)}&dates=${dates.join(',')}`, { cache:'no-store' });
    if (!r.ok) return [];
    const data = await r.json();
    const msgs = [];
    for (const d of dates){
      const w = data.results[d]; if (!w) continue;
      if (w.deputies && w.deputies.length) msgs.push(`${d}：職代 ${w.deputies.join('、')} 當天也請假`);
      if (w.deputies_biz && w.deputies_biz.length) msgs.push(`${d}：職代 ${w.deputies_biz.join('、')} 當天出差`);
      if (w.over) msgs.push(`${d}：部門當天請假已達 1/3（已 ${w.dept_count} 人）`);
    }
    return msgs;
  } catch (_) { return []; }
}

async function addLeave(date, typeId){
  const w = await warnFor([date], typeId);
  if (w.length && !(await App.confirm('注意：\n' + w.join('\n') + '\n\n仍要請假嗎？', { title:'請假提醒', okText:'仍要請假' }))) return;
  try {
    await api('/api/my-leaves', { method:'POST', body: JSON.stringify({ date, leave_type_id: typeId, period: periodOfType(typeId) }) });
    await loadMyLeaves(); refreshMonth();
  } catch (e) { App.toast('操作失敗：' + e.message,'err'); }
}
async function cancelLeave(id){
  try {
    await api(`/api/my-leaves/${id}`, { method:'DELETE' });
    await loadMyLeaves(); refreshMonth();
  } catch (e) { App.toast('操作失敗：' + e.message,'err'); }
}
async function fillRange(startDate, endDate, typeId){
  const period = periodOfType(typeId);
  const biz = isBizType(typeId); // 出差不略過週末/假日
  const items = [];
  const d = new Date(startDate + 'T00:00:00'), end = new Date(endDate + 'T00:00:00');
  for (; d <= end; d.setDate(d.getDate()+1)){
    const dow = d.getDay();
    const date = ymd(d.getFullYear(), d.getMonth()+1, d.getDate());
    if (!biz && (dow===0 || dow===6 || holidays.has(date))) continue; // 略過週末/國定假日
    items.push({ date, leave_type_id: typeId, period });
  }
  if (!items.length) { App.toast('此區間內沒有可請假的日子（週末/假日已略過）','err'); return; }
  const w = await warnFor(items.map(i => i.date), typeId);
  if (w.length && !(await App.confirm('注意：\n' + w.join('\n') + '\n\n仍要送出區間請假嗎？', { title:'區間請假提醒', okText:'仍要送出' }))) return;
  try {
    const r = await api('/api/my-leaves/bulk', { method:'POST', body: JSON.stringify({ items }) });
    if (!r.ok) throw new Error('HTTP ' + r.status);
  } catch (e) { App.toast('區間請假失敗：' + e.message,'err'); }
  await loadMyLeaves(); refreshMonth();
}

init();
</script>
