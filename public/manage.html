<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>休假管理</title>
<style>
  :root{ --border:#e5e7eb; --muted:#6b7280; --bg:#f9fafb; --weekend:#fef2f2; --blue:#2563eb; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:-apple-system,"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif; color:#1f2937; background:var(--bg); }
  .page{ max-width:640px; margin:0 auto; padding:14px; }
  .top{ display:flex; align-items:baseline; gap:12px; }
  h1{ font-size:20px; margin:0 0 2px; }
  .spacer{ flex:1; }
  a.nav-link{ font-size:13px; color:var(--blue); text-decoration:none; }
  a.nav-link:hover{ text-decoration:underline; }
  .muted{ color:var(--muted); font-size:13px; }
  .card{ background:#fff; border:1px solid var(--border); border-radius:12px; padding:14px; margin-top:12px; }
  .row{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .field{ display:flex; flex-direction:column; gap:4px; }
  .field label{ font-size:12px; color:var(--muted); }
  button{ font:inherit; cursor:pointer; border-radius:8px; border:1px solid var(--border); background:#fff; padding:7px 12px; }
  button.primary{ background:var(--blue); color:#fff; border-color:var(--blue); }
  button:hover{ filter:brightness(0.98); }
  select,input[type=text],input[type=password]{ font:inherit; padding:8px 10px; border:1px solid var(--border); border-radius:8px; }
  .nav{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin:10px 0; }
  .cal{ display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .cal .wd{ text-align:center; font-size:12px; color:var(--muted); padding:4px 0; }
  .cal .wd.we{ color:#ef4444; }
  .day{ aspect-ratio:1/1; border:1px solid var(--border); border-radius:8px; padding:3px; display:flex; flex-direction:column; gap:2px; cursor:pointer; background:#fff; position:relative; }
  .day.we{ background:var(--weekend); }
  .day.empty{ visibility:hidden; }
  .day .d{ font-size:12px; color:#374151; }
  .day .chip{ border-radius:5px; color:#fff; font-size:11px; font-weight:600; text-align:center; padding:2px 0; }
  .status{ color:var(--muted); padding:18px; text-align:center; }
  .err{ color:#b91c1c; }
  .link{ color:var(--blue); cursor:pointer; font-size:13px; background:none; border:none; padding:0; }
  footer{ color:var(--muted); font-size:11px; margin-top:10px; text-align:center; }
</style>
</head>
<body>
<div class="page">
  <div class="top">
    <h1>休假管理</h1>
    <span class="spacer"></span>
    <a class="nav-link" href="index.html">全部排休</a>
    <a class="nav-link" href="stats.html">統計</a>
  </div>
  <div class="muted">新增/刪除任一員工的休假，直接寫回資料庫。</div>
  <div id="app"><div class="status">載入中…</div></div>
  <footer id="footer"></footer>
</div>

<script>
const API_BASE = (new URLSearchParams(location.search).get('api')
  || 'https://workforcemanagement.ellyfd.workers.dev').replace(/\/+$/, '');
const WEEKDAY = ['日','一','二','三','四','五','六'];

let adminKey = localStorage.getItem('dev_admin_key') || '';
let meta = null;            // { departments, employees, leave_types }
let curEmpId = '';
let cur = new Date();
let recs = [];              // 目前員工該年的休假紀錄

const app = document.getElementById('app');
function api(path, opts = {}){
  return fetch(API_BASE + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', ...(adminKey ? { 'X-Admin-Key': adminKey } : {}), ...(opts.headers || {}) },
  });
}
function pad(n){ return String(n).padStart(2,'0'); }
function ymd(y,m,d){ return `${y}-${pad(m)}-${pad(d)}`; }
function typeById(id){ return (meta.leave_types || []).find(t => t.id === id); }
function colorOf(id){ const t = typeById(id); return t ? (t.color || '#64748b') : '#64748b'; }
function labelOf(id){ const t = typeById(id); return t ? (t.short_name || t.name) : '休'; }
const PERIOD_TXT = { full:'整天', morning:'上午', afternoon:'下午' };

async function init(){
  try {
    const res = await api('/api/admin/meta');
    if (res.status === 401) return showKeyPrompt();
    if (!res.ok) throw new Error('HTTP ' + res.status);
    meta = await res.json();
    if (!curEmpId && meta.employees.length) curEmpId = meta.employees[0].id;
    await loadRecs();
    render();
  } catch (e) {
    app.innerHTML = `<div class="status err">連線失敗：${e.message}</div>`;
  }
}

function showKeyPrompt(){
  app.innerHTML = `
    <div class="card">
      <div class="field">
        <label>需要管理密鑰（系統已設定 ADMIN_KEY）</label>
        <input id="key" type="password" placeholder="輸入管理密鑰…" />
      </div>
      <div class="row" style="margin-top:10px;"><button class="primary" id="save">進入</button></div>
    </div>`;
  document.getElementById('save').onclick = () => {
    adminKey = document.getElementById('key').value.trim();
    localStorage.setItem('dev_admin_key', adminKey);
    init();
  };
}

async function loadRecs(){
  if (!curEmpId) { recs = []; return; }
  const r = await api(`/api/admin/leaves?employee_id=${encodeURIComponent(curEmpId)}&year=${cur.getFullYear()}`);
  recs = r.ok ? await r.json() : [];
}

function deptName(emp){
  let ids = [];
  try { ids = JSON.parse(emp.department_ids || '[]'); } catch (_) {}
  const names = ids.map(id => (meta.departments.find(d => d.id === id) || {}).name).filter(Boolean);
  return names.join('、');
}

function render(){
  const y = cur.getFullYear(), m = cur.getMonth() + 1;
  const first = new Date(y, m-1, 1).getDay();
  const days = new Date(y, m, 0).getDate();

  const empOpts = meta.employees.map(e =>
    `<option value="${e.id}"${e.id===curEmpId?' selected':''}>${e.name}${e.english_name?`（${e.english_name}）`:''}</option>`).join('');
  const typeOpts = meta.leave_types.map(t => `<option value="${t.id}">${t.name}</option>`).join('');

  // 該月每日的紀錄（一天可有上午/下午各一筆）
  const byDate = {};
  for (const r of recs) (byDate[r.date] ||= []).push(r);

  let cells = '';
  for (let i=0;i<first;i++) cells += `<div class="day empty"></div>`;
  for (let d=1; d<=days; d++){
    const date = ymd(y,m,d);
    const dow = new Date(y, m-1, d).getDay();
    const we = dow===0 || dow===6;
    const chips = (byDate[date] || []).map(r =>
      `<div class="chip" data-id="${r.id}" style="background:${colorOf(r.leave_type_id)}" title="點此刪除">${labelOf(r.leave_type_id)}${r.period&&r.period!=='full'?`(${PERIOD_TXT[r.period]||r.period})`:''}</div>`
    ).join('');
    cells += `<div class="day${we?' we':''}" data-date="${date}"><div class="d">${d}</div>${chips}</div>`;
  }

  app.innerHTML = `
    <div class="card">
      <div class="row">
        <div class="field" style="flex:1; min-width:200px;">
          <label>員工</label>
          <select id="emp">${empOpts}</select>
        </div>
      </div>
      <div class="muted" id="deptline" style="margin-top:6px;"></div>
      <div class="row" style="margin-top:10px;">
        <div class="field" style="flex:1; min-width:140px;"><label>假別</label><select id="ltype">${typeOpts}</select></div>
        <div class="field" style="min-width:120px;"><label>時段</label>
          <select id="period"><option value="full">整天</option><option value="morning">上午</option><option value="afternoon">下午</option></select>
        </div>
      </div>
      <div class="nav">
        <button id="prev">‹ 上個月</button>
        <b>${y} 年 ${m} 月</b>
        <button id="next">下個月 ›</button>
      </div>
      <div class="cal">
        ${WEEKDAY.map((w,i)=>`<div class="wd${i===0||i===6?' we':''}">${w}</div>`).join('')}
        ${cells}
      </div>
      <div class="muted" style="margin-top:10px;">點空白日期＝用上方假別／時段新增；點已有色塊＝刪除該筆。</div>
    </div>`;

  document.getElementById('deptline').textContent = (() => {
    const e = meta.employees.find(x => x.id === curEmpId);
    const dn = e ? deptName(e) : '';
    return dn ? `部門：${dn}` : '';
  })();

  document.getElementById('emp').onchange = async (ev) => { curEmpId = ev.target.value; await loadRecs(); render(); };
  document.getElementById('prev').onclick = async () => { cur = new Date(y, m-2, 1); await loadRecs(); render(); };
  document.getElementById('next').onclick = async () => { cur = new Date(y, m, 1); await loadRecs(); render(); };

  app.querySelectorAll('.day[data-date]').forEach(el => {
    el.onclick = (ev) => {
      const chip = ev.target.closest('.chip');
      if (chip) { delRec(chip.dataset.id); return; }
      addRec(el.dataset.date);
    };
  });
}

async function addRec(date){
  const leave_type_id = document.getElementById('ltype').value;
  const period = document.getElementById('period').value;
  try {
    const res = await api('/api/admin/leaves', {
      method:'POST',
      body: JSON.stringify({ employee_id: curEmpId, date, leave_type_id, period }),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    await loadRecs(); render();
  } catch (e) { alert('新增失敗：' + e.message); }
}

async function delRec(id){
  try {
    const res = await api(`/api/admin/leaves/${id}`, { method:'DELETE' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    await loadRecs(); render();
  } catch (e) { alert('刪除失敗：' + e.message); }
}

init();
</script>
</body>
</html>
