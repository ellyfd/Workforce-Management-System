<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>人員管理 · 開發處休假表</title>
<link rel="stylesheet" href="app.css" />
<style>
  .checks{ display:flex; flex-wrap:wrap; gap:10px; }
  .checks label{ display:inline-flex; align-items:center; gap:5px; font-size:14px; color:var(--ink); }
  .num{ width:60px; }
  .note{ color:var(--muted); font-size:14px; margin-bottom:12px; }
  .tag.amber{ background:#fef3c7; color:#92400e; }
  .selbar{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; background:#eff6ff; border:1px solid #bfdbfe; border-radius:8px; padding:8px 10px; margin-bottom:10px; }
  .filterbox{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
  input[type=file]{ display:none; }
  /* 姓名：中文在上、英文在下（垂直堆疊）*/
  .nmcell{ display:flex; flex-direction:column; line-height:1.25; }
  .nmcell .en{ color:var(--muted); font-size:13px; }
  /* 部門拖曳排序 */
  .ord{ white-space:nowrap; }
  .ord .grip{ cursor:grab; color:var(--muted); user-select:none; touch-action:none; font-size:16px; margin-right:6px; }
  .ord .ordn{ color:var(--muted); font-variant-numeric:tabular-nums; }
  .deptrow.dragging{ opacity:.55; background:#eff6ff; }
  /* 操作改用圖示（✏️ 編輯、🗑️ 刪除）*/
  .acts{ white-space:nowrap; text-align:right; }
  .acts .iconbtn{ font-size:18px; line-height:1; }
  .acts .iconbtn.del:hover{ background:#fee2e2; }
  .short{ display:none; }
  @media (max-width:560px){
    .full{ display:none; } .short{ display:inline; }
    /* 標題列＋工具列維持單行，不折行 */
    .emphead{ flex-wrap:nowrap; gap:8px; }
    .emphead > b{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .emphead .tools{ flex-wrap:nowrap; gap:6px; flex:none; }
    .emphead .tools .btn{ padding:6px 10px; }
    table.data th, table.data td{ padding:8px 8px; }
  }
</style>
</head>
<body class="has-shell">
<main class="app-main">
  <div class="page-head"><h1>人員管理</h1></div>
  <div class="note">在此維護員工與部門資料，變更即時寫入系統。</div>
  <div class="tabs">
    <button id="tabEmp" class="active">員工管理</button>
    <button id="tabDept">部門管理</button>
  </div>
  <div id="panel"><div class="status">載入中…</div></div>
</main>

<script src="app.js"></script>
<script>
const { esc } = App;
let depts = [], emps = [], tab = 'emp';
let deptFilter = new Set();   // 部門篩選
let deputyFilter = new Set(); // 職代篩選（職代員工 id）
let statusFilter = new Set(); // 狀態篩選
let loginFilter = 'all';      // 上次登入篩選：all / 7d / 30d / never
let sortKey = null, sortDir = 1; // 排序欄位與方向（1 升冪 / -1 降冪）
let selected = new Set();      // 勾選的員工 id（批次用）
let empSearch = '';            // 員工搜尋關鍵字（中/英文名）

// 部門篩選：桌機行內多選；手機收合為下拉
let deptMenuOpen = false;
const deptMobile = window.matchMedia('(max-width: 560px)');
deptMobile.addEventListener('change', ()=>{ deptMenuOpen = false; if (tab==='emp') renderEmp(); });
document.addEventListener('click', (e)=>{
  if (!deptMenuOpen) return;
  if (e.target.closest && e.target.closest('#empDeptDrop')) return;
  deptMenuOpen = false;
  const m = document.getElementById('empDeptMenu'); if (m) m.hidden = true;
});
function empDeptFilterHTML(){
  const boxes = depts.map(d=>`<label><input type="checkbox" class="df" value="${esc(d.id)}" ${deptFilter.has(d.id)?'checked':''}/> ${esc(d.name)}</label>`).join('');
  if (deptMobile.matches){
    const n = deptFilter.size;
    const lab = n===0 ? '全部部門' : (n<=2 ? [...deptFilter].map(deptName).filter(Boolean).join('、') : `已選 ${n} 個`);
    return `<div class="filterbox"><span class="muted">篩選：</span>`
      + `<div class="deptdrop" id="empDeptDrop">`
      + `<button class="btn sm deptbtn" id="empDeptBtn">${esc(lab)} <span class="caret">▾</span></button>`
      + `<div class="deptmenu" id="empDeptMenu"${deptMenuOpen?'':' hidden'}>${boxes||'<span class="muted">無部門</span>'}`
      + `<div class="foot"><button class="btn sm" id="empDfClear">清除</button><button class="btn sm primary" id="empDfClose">完成</button></div>`
      + `</div></div></div>`;
  }
  return `<div class="filterbox"><span class="muted">篩選部門：</span><div class="checks">${boxes||'<span class="muted">無部門</span>'}</div></div>`;
}
const STATUS = { active:'在職', parental_leave:'育嬰假', inactive:'離職', hidden:'隱藏' };
const STATUS_CLS = { active:'green', parental_leave:'blue', inactive:'gray', hidden:'amber' };

// 上次登入：近期顯示相對時間，較久顯示日期；hover 顯示完整時間
function fmtLogin(iso){
  if (!iso) return '<span class="muted">從未</span>';
  const t = Date.parse(iso); if (Number.isNaN(t)) return '<span class="muted">—</span>';
  const diff = Date.now() - t, min=60000, hr=3600000, day=86400000;
  let label;
  if (diff < min) label = '剛剛';
  else if (diff < hr) label = `${Math.floor(diff/min)} 分鐘前`;
  else if (diff < day) label = `${Math.floor(diff/hr)} 小時前`;
  else if (diff < 7*day) label = `${Math.floor(diff/day)} 天前`;
  else { const d = new Date(t); label = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`; }
  return `<span class="muted" title="${esc(new Date(t).toLocaleString('zh-TW'))}">${label}</span>`;
}
const deptName = id => (depts.find(d=>d.id===id)||{}).name || '';
function empDeptIds(e){ try{ const v=JSON.parse(e.department_ids||'[]'); return Array.isArray(v)?v:[]; }catch(_){ return []; } }
function empManagedIds(e){ try{ const v=JSON.parse(e.managed_dept_ids||'[]'); return Array.isArray(v)?v:[]; }catch(_){ return []; } }
function empDepts(e){ return empDeptIds(e).map(deptName).filter(Boolean); }
function empById(id){ return emps.find(e=>e.id===id); }
function nameOf(id){ const e=empById(id); return e?e.name:''; }

async function loadAll(){
  const [rd, re] = await Promise.all([ App.adminApi('/api/admin/departments'), App.adminApi('/api/admin/employees') ]);
  if (rd.status===401 || re.status===401){ document.getElementById('panel').innerHTML = '<div class="status err">此頁僅限管理員。請在「我的排休 → 切換身分」綁定為管理員帳號。</div>'; return; }
  depts = rd.ok ? await rd.json() : [];
  emps = re.ok ? await re.json() : [];
  render();
}
function render(){ tab==='emp' ? renderEmp() : renderDept(); }

/* ── 員工管理 ── */
const STATUS_ORDER = ['active','parental_leave','hidden','inactive'];
function loginMs(e){ return e.last_login ? Date.parse(e.last_login) : 0; }
function sortVal(e){
  switch(sortKey){
    case 'name':   return (e.name||'') || (e.english_name||'');
    case 'dept':   return empDepts(e)[0]||'';
    case 'deputy': return [e.deputy_1,e.deputy_2].filter(Boolean).map(nameOf).filter(Boolean).join('、');
    case 'status': return STATUS_ORDER.indexOf(e.status);
    case 'login':  return loginMs(e);
    default: return 0;
  }
}
function anyFilter(){ return !!(empSearch.trim()||deptFilter.size||deputyFilter.size||statusFilter.size||loginFilter!=='all'); }
function visibleEmps(){
  let arr = emps.slice();
  const q = empSearch.trim().toLowerCase();
  if (q) arr = arr.filter(e => (e.name||'').toLowerCase().includes(q) || (e.english_name||'').toLowerCase().includes(q));
  if (deptFilter.size) arr = arr.filter(e => empDeptIds(e).some(d => deptFilter.has(d)));
  if (deputyFilter.size) arr = arr.filter(e => deputyFilter.has(e.deputy_1) || deputyFilter.has(e.deputy_2));
  if (statusFilter.size) arr = arr.filter(e => statusFilter.has(e.status));
  if (loginFilter==='never') arr = arr.filter(e => !e.last_login);
  else if (loginFilter==='7d') arr = arr.filter(e => e.last_login && Date.now()-Date.parse(e.last_login) <= 7*86400000);
  else if (loginFilter==='30d') arr = arr.filter(e => e.last_login && Date.now()-Date.parse(e.last_login) <= 30*86400000);
  if (sortKey) arr.sort((a,b)=>{ const va=sortVal(a), vb=sortVal(b); const r = (typeof va==='number') ? va-vb : String(va).localeCompare(String(vb),'zh-Hant'); return r*sortDir; });
  return arr;
}

// 欄位篩選 popover（掛在 body、fixed 定位，避免被表格捲動容器裁切）
let popEl = null, popOutside = null;
function closePop(){
  if (popEl){ popEl.remove(); popEl = null; }
  if (popOutside){ document.removeEventListener('click', popOutside, true); document.removeEventListener('keydown', popKey, true); window.removeEventListener('scroll', closePop, true); popOutside = null; }
}
function popKey(e){ if (e.key==='Escape') closePop(); }
function openPop(anchor, html, wire){
  closePop();
  popEl = document.createElement('div');
  popEl.className = 'colpop';
  popEl.innerHTML = html;
  document.body.appendChild(popEl);
  const r = anchor.getBoundingClientRect();
  let left = Math.min(r.left, window.innerWidth - popEl.offsetWidth - 8);
  popEl.style.left = Math.max(8, left) + 'px';
  popEl.style.top = (r.bottom + 4) + 'px';
  wire(popEl);
  popOutside = (e)=>{ if (popEl && !popEl.contains(e.target) && !anchor.contains(e.target)) closePop(); };
  setTimeout(()=>{ document.addEventListener('click', popOutside, true); document.addEventListener('keydown', popKey, true); window.addEventListener('scroll', closePop, true); }, 0);
}
function distinctDeputies(){
  const ids = new Set();
  emps.forEach(e=>{ if (e.deputy_1) ids.add(e.deputy_1); if (e.deputy_2) ids.add(e.deputy_2); });
  return [...ids].map(id=>({ id, name: nameOf(id) })).filter(x=>x.name).sort((a,b)=>a.name.localeCompare(b.name,'zh-Hant'));
}
function openColFilter(key, anchor){
  let html = '', wire = ()=>{};
  const foot = '<div class="foot"><button class="btn sm" id="cpClear">清除</button></div>';
  if (key==='name'){
    html = `<input type="search" id="cpName" placeholder="搜尋姓名 / 英文名…" value="${esc(empSearch)}"/>${foot}`;
    wire = (p)=>{ const i=p.querySelector('#cpName'); i.focus(); i.oninput=()=>{ empSearch=i.value; const ss=document.getElementById('empSearch'); if(ss) ss.value=empSearch; paintEmpList(); }; p.querySelector('#cpClear').onclick=()=>{ empSearch=''; const ss=document.getElementById('empSearch'); if(ss) ss.value=''; paintEmpList(); closePop(); }; };
  } else if (key==='dept'){
    const boxes = depts.map(d=>`<label><input type="checkbox" class="cf" value="${esc(d.id)}" ${deptFilter.has(d.id)?'checked':''}/> ${esc(d.name)}</label>`).join('') || '<span class="muted">無部門</span>';
    html = boxes + foot;
    wire = (p)=>{ p.querySelectorAll('.cf').forEach(c=>c.onchange=()=>{ c.checked?deptFilter.add(c.value):deptFilter.delete(c.value); paintEmpList(); }); p.querySelector('#cpClear').onclick=()=>{ deptFilter.clear(); paintEmpList(); closePop(); }; };
  } else if (key==='deputy'){
    const boxes = distinctDeputies().map(x=>`<label><input type="checkbox" class="cf" value="${esc(x.id)}" ${deputyFilter.has(x.id)?'checked':''}/> ${esc(x.name)}</label>`).join('') || '<span class="muted">無職代</span>';
    html = boxes + foot;
    wire = (p)=>{ p.querySelectorAll('.cf').forEach(c=>c.onchange=()=>{ c.checked?deputyFilter.add(c.value):deputyFilter.delete(c.value); paintEmpList(); }); p.querySelector('#cpClear').onclick=()=>{ deputyFilter.clear(); paintEmpList(); closePop(); }; };
  } else if (key==='status'){
    const boxes = Object.entries(STATUS).map(([k,v])=>`<label><input type="checkbox" class="cf" value="${k}" ${statusFilter.has(k)?'checked':''}/> ${v}</label>`).join('');
    html = boxes + foot;
    wire = (p)=>{ p.querySelectorAll('.cf').forEach(c=>c.onchange=()=>{ c.checked?statusFilter.add(c.value):statusFilter.delete(c.value); paintEmpList(); }); p.querySelector('#cpClear').onclick=()=>{ statusFilter.clear(); paintEmpList(); closePop(); }; };
  } else if (key==='login'){
    html = [['all','全部'],['7d','7 天內'],['30d','30 天內'],['never','從未登入']]
      .map(([v,l])=>`<label><input type="radio" name="cpLogin" class="cf" value="${v}" ${loginFilter===v?'checked':''}/> ${l}</label>`).join('');
    wire = (p)=>{ p.querySelectorAll('.cf').forEach(c=>c.onchange=()=>{ loginFilter=c.value; paintEmpList(); }); };
  }
  openPop(anchor, html, wire);
}
function selBarHTML(){
  return selected.size ? `<div class="selbar">
      <b>已選 ${selected.size} 人</b>
      <button class="btn sm" id="bulkEdit">批次編輯</button>
      <button class="btn sm danger" id="bulkDel">批次刪除</button>
      <button class="btn sm" id="selClear">清除選取</button>
    </div>` : '';
}
// 只重畫清單（計數／批次列／表格），搜尋框與篩選保留在外層，打字不失焦
function paintEmpList(){
  const list = visibleEmps();
  document.getElementById('empCount').textContent = list.length;
  document.getElementById('selBar').innerHTML = selBarHTML();
  const rows = list.map(e=>{
    const dep = [e.deputy_1, e.deputy_2].filter(Boolean).map(nameOf).filter(Boolean).join('、');
    return `<tr>
      <td><input type="checkbox" class="sel" value="${esc(e.id)}" ${selected.has(e.id)?'checked':''}/></td>
      <td><div class="nmcell"><b>${esc(e.name)}</b>${e.english_name?`<small class="en">${esc(e.english_name)}</small>`:''}</div></td>
      <td>${empDepts(e).map(n=>`<span class="tag">${esc(n)}</span>`).join(' ')||'<span class="muted">—</span>'}</td>
      <td>${dep?esc(dep):'<span class="muted">—</span>'}</td>
      <td><span class="tag ${STATUS_CLS[e.status]||'gray'}">${STATUS[e.status]||e.status}</span>${e.role==='admin'?' <span class="tag blue">管理員</span>':e.role==='manager'?' <span class="tag blue">主管</span>':''}</td>
      <td>${fmtLogin(e.last_login)}</td>
      <td class="acts"><button class="iconbtn" data-edit="${esc(e.id)}" title="編輯" aria-label="編輯">✏️</button><button class="iconbtn del" data-del="${esc(e.id)}" title="刪除" aria-label="刪除">🗑️</button></td>
    </tr>`;
  }).join('');
  const arrow = (key)=> sortKey!==key ? '<span class="arr dim">⇅</span>' : `<span class="arr">${sortDir>0?'▲':'▼'}</span>`;
  const fOn = { name: !!empSearch.trim(), dept: deptFilter.size>0, deputy: deputyFilter.size>0, status: statusFilter.size>0, login: loginFilter!=='all' };
  const funnel = '<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h18l-7 8v6l-4 2v-8z"/></svg>';
  const th = (key,label)=>`<th class="col"><span class="th-in" data-sort="${key}">${label} ${arrow(key)}</span><button class="fbtn ${fOn[key]?'on':''}" data-filter="${key}" title="篩選">${funnel}</button></th>`;
  document.getElementById('empBody').innerHTML = `<table class="data">
      <thead><tr><th></th>${th('name','姓名')}${th('dept','部門')}${th('deputy','職代')}${th('status','狀態')}${th('login','上次登入')}<th></th></tr></thead>
      <tbody>${rows||`<tr><td colspan="7" class="empty">${anyFilter()?'查無符合條件的員工':'無員工'}</td></tr>`}</tbody>
    </table>`;
  document.querySelectorAll('[data-sort]').forEach(el=>el.onclick=()=>{ const k=el.dataset.sort; if (sortKey===k) sortDir=-sortDir; else { sortKey=k; sortDir=1; } paintEmpList(); });
  document.querySelectorAll('[data-filter]').forEach(b=>b.onclick=(ev)=>{ ev.stopPropagation(); openColFilter(b.dataset.filter, b); });
  document.querySelectorAll('.sel').forEach(c=>c.onchange=()=>{ c.checked?selected.add(c.value):selected.delete(c.value); paintEmpList(); });
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>empForm(empById(b.dataset.edit)));
  document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>delEmp(b.dataset.del));
  if (selected.size){
    document.getElementById('selClear').onclick = ()=>{ selected.clear(); paintEmpList(); };
    document.getElementById('bulkEdit').onclick = bulkEditForm;
    document.getElementById('bulkDel').onclick = bulkDelete;
  }
}
function renderEmp(){
  document.getElementById('panel').innerHTML = `
    <div class="card">
      <div class="row emphead" style="justify-content:space-between;margin-bottom:10px;">
        <b>員工列表 <span class="muted">（<span id="empCount"></span>）</span></b>
        <div class="row tools">
          <button class="btn sm" id="tpl"><span class="full">下載模板</span><span class="short">模板</span></button>
          <button class="btn sm" id="imp"><span class="full">CSV 匯入</span><span class="short">匯入</span></button>
          <input type="file" id="impFile" accept=".csv,text/csv" />
          <button class="btn primary" id="add"><span class="full">＋ 新增員工</span><span class="short">＋</span></button>
        </div>
      </div>
      <div class="filterbox"><input id="empSearch" type="search" placeholder="🔍 搜尋中文 / 英文名…" value="${esc(empSearch)}" style="flex:1;min-width:0;" /></div>
      <div id="selBar"></div>
      <div id="empBody" class="table-wrap"></div>
    </div>`;
  document.getElementById('add').onclick = ()=>empForm();
  document.getElementById('tpl').onclick = downloadTemplate;
  document.getElementById('imp').onclick = ()=>document.getElementById('impFile').click();
  document.getElementById('impFile').onchange = (ev)=>{ if(ev.target.files[0]) importCSV(ev.target.files[0]); };
  const si = document.getElementById('empSearch');
  si.oninput = ()=>{ empSearch = si.value; paintEmpList(); };
  paintEmpList();
}

function deputyOptions(selfId, deptIds, current, excludeId){
  const cands = emps.filter(e => e.status==='active' && e.id!==selfId && e.id!==excludeId && empDeptIds(e).some(d=>deptIds.includes(d)));
  return `<option value="">無</option>` + cands.map(e=>`<option value="${esc(e.id)}" ${current===e.id?'selected':''}>${esc(e.name)}${e.english_name?`（${esc(e.english_name)}）`:''}</option>`).join('');
}

function empForm(e){
  const cur = e || { name:'', english_name:'', department_ids:'[]', status:'active', deputy_1:null, deputy_2:null, sort_order:(emps.length+1)*10 };
  let ids = empDeptIds(cur);
  const checks = depts.map(d=>`<label><input type="checkbox" class="dc" value="${esc(d.id)}" ${ids.includes(d.id)?'checked':''}/> ${esc(d.name)}</label>`).join('');
  const managed = empManagedIds(cur);
  const mchecks = depts.map(d=>`<label><input type="checkbox" class="mdc" value="${esc(d.id)}" ${managed.includes(d.id)?'checked':''}/> ${esc(d.name)}</label>`).join('');
  const statusOpts = Object.entries(STATUS).map(([k,v])=>`<option value="${k}" ${cur.status===k?'selected':''}>${v}</option>`).join('');
  modal(`${e?'編輯':'新增'}員工`, `
    <div class="field"><label>姓名</label><input id="f_name" value="${esc(cur.name)}" /></div>
    <div class="field"><label>英文名 / 職代</label><input id="f_en" value="${esc(cur.english_name||'')}" /></div>
    <div class="field"><label>部門</label><div class="checks" id="f_depts">${checks||'<span class="muted">尚無部門</span>'}</div></div>
    <div class="field"><label>第一順位職代</label><select id="f_dep1"></select></div>
    <div class="field"><label>第二順位職代</label><select id="f_dep2"></select></div>
    <div class="row" style="gap:10px;">
      <div class="field" style="flex:1;"><label>狀態</label><select id="f_status">${statusOpts}</select></div>
      <div class="field" style="flex:1;"><label>角色</label><select id="f_role"><option value="user"${(!cur.role||cur.role==='user')?' selected':''}>一般</option><option value="manager"${cur.role==='manager'?' selected':''}>主管</option><option value="admin"${cur.role==='admin'?' selected':''}>管理員</option></select></div>
    </div>
    <div class="field" id="f_mgr_wrap" style="display:${cur.role==='manager'?'':'none'};"><label>負責部門（主管的可見範圍）</label>
      <label style="display:flex;gap:8px;align-items:center;margin:2px 0 8px;font-weight:600;cursor:pointer;"><input type="checkbox" id="f_mgr_all" ${managed.includes('*')?'checked':''}/> 看全部部門（含日後新增）</label>
      <div class="checks" id="f_mdepts">${mchecks||'<span class="muted">尚無部門</span>'}</div></div>
    <div class="muted" style="font-size:14px;">職代僅列出「在職且與本人有共同部門」的同仁，需先勾選部門。<br>角色：<b>一般</b>只看自己部門；<b>主管</b>另可看「負責部門」；<b>管理員</b>看全部並可編輯排休與進設定。</div>
  `, async ()=>{
    const name = document.getElementById('f_name').value.trim();
    if (!name){ App.toast('請輸入姓名','err'); return false; }
    const department_ids = [...document.querySelectorAll('#f_depts .dc:checked')].map(i=>i.value);
    const body = {
      name, english_name: document.getElementById('f_en').value.trim(),
      department_ids,
      deputy_1: document.getElementById('f_dep1').value || null,
      deputy_2: document.getElementById('f_dep2').value || null,
      status: document.getElementById('f_status').value,
      role: document.getElementById('f_role').value,
      managed_dept_ids: document.getElementById('f_mgr_all').checked ? ['*'] : [...document.querySelectorAll('#f_mdepts .mdc:checked')].map(i=>i.value),
    };
    const res = e ? await App.adminApi(`/api/admin/employees/${e.id}`,{method:'PUT',body:JSON.stringify(body)})
                  : await App.adminApi('/api/admin/employees',{method:'POST',body:JSON.stringify(body)});
    if (!res.ok){ App.toast('儲存失敗','err'); return false; }
    App.toast(e?'已更新員工':'已新增員工','ok');
    await loadAll(); return true;
  });
  // 職代下拉：依勾選部門連動
  const refreshDeputies = ()=>{
    const selfId = e ? e.id : null;
    const dids = [...document.querySelectorAll('#f_depts .dc:checked')].map(i=>i.value);
    const d1 = document.getElementById('f_dep1'), d2 = document.getElementById('f_dep2');
    const cur1 = d1.value || (e?e.deputy_1:'') || '';
    d1.innerHTML = deputyOptions(selfId, dids, cur1, null);
    const cur2 = d2.value || (e?e.deputy_2:'') || '';
    d2.innerHTML = deputyOptions(selfId, dids, cur2, d1.value || cur1); // 排除 deputy_1
  };
  refreshDeputies();
  // 角色切到「主管」才顯示負責部門
  const roleSel = document.getElementById('f_role'), mgrWrap = document.getElementById('f_mgr_wrap');
  roleSel.onchange = ()=>{ mgrWrap.style.display = roleSel.value==='manager' ? '' : 'none'; };
  // 「看全部部門」勾選時，停用個別部門勾選
  const mgrAll = document.getElementById('f_mgr_all');
  const toggleMgrAll = ()=>{ document.querySelectorAll('#f_mdepts .mdc').forEach(c=>c.disabled = mgrAll.checked); document.getElementById('f_mdepts').style.opacity = mgrAll.checked ? '.45' : '1'; };
  mgrAll.onchange = toggleMgrAll; toggleMgrAll();
  document.querySelectorAll('#f_depts .dc').forEach(c=>c.onchange=refreshDeputies);
  document.getElementById('f_dep1').onchange = refreshDeputies; // 改 deputy_1 → 重算 deputy_2 候選
}

async function delEmp(id){
  const e = empById(id);
  if (!await App.confirm(`確定刪除「${e?e.name:''}」？其休假紀錄與職代參照都會清理。`, { title:'刪除員工', okText:'刪除', danger:true })) return;
  const res = await App.adminApi(`/api/admin/employees/${id}`,{method:'DELETE'});
  if (!res.ok){ App.toast('刪除失敗','err'); return; }
  App.toast('已刪除','ok');
  selected.delete(id); loadAll();
}

function bulkEditForm(){
  const checks = depts.map(d=>`<label><input type="checkbox" class="bc" value="${esc(d.id)}"/> ${esc(d.name)}</label>`).join('');
  const statusOpts = `<option value="">（不改）</option>` + Object.entries(STATUS).map(([k,v])=>`<option value="${k}">${v}</option>`).join('');
  modal(`批次編輯 ${selected.size} 人`, `
    <div class="muted" style="font-size:14px;margin-bottom:8px;">留空＝不更動。勾選部門會「覆蓋」這些人的部門。</div>
    <div class="field"><label>設定部門（覆蓋）</label><div class="checks">${checks}</div>
      <label style="margin-top:6px;"><input type="checkbox" id="b_setdept"/> 套用上面的部門設定</label></div>
    <div class="field"><label>設定狀態</label><select id="b_status">${statusOpts}</select></div>
  `, async ()=>{
    const body = { ids:[...selected] };
    if (document.getElementById('b_setdept').checked) body.department_ids = [...document.querySelectorAll('.modal .bc:checked')].map(i=>i.value);
    const st = document.getElementById('b_status').value; if (st) body.status = st;
    if (body.department_ids===undefined && !body.status){ App.toast('沒有要更改的項目','err'); return false; }
    const res = await App.adminApi('/api/admin/employees/bulk',{method:'POST',body:JSON.stringify(body)});
    if (!res.ok){ App.toast('批次更新失敗','err'); return false; }
    App.toast('已批次更新','ok');
    selected.clear(); await loadAll(); return true;
  });
}
async function bulkDelete(){
  if (!await App.confirm(`確定刪除選取的 ${selected.size} 人？休假紀錄與職代參照都會清理。`, { title:'批次刪除', okText:'刪除', danger:true })) return;
  const res = await App.adminApi('/api/admin/employees/delete',{method:'POST',body:JSON.stringify({ids:[...selected]})});
  if (!res.ok){ App.toast('批次刪除失敗','err'); return; }
  App.toast('已刪除','ok');
  selected.clear(); loadAll();
}

/* ── CSV ── */
function downloadTemplate(){
  const csv = '﻿' + 'name,english_name,department_name\n王小明,Ming,DPC\n';
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'employees_template.csv';
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(a.href);
}
async function importCSV(file){
  const text = (await file.text()).replace(/^﻿/, '').trim();
  if (!text){ App.toast('檔案是空的','err'); return; }
  const lines = text.split(/\r?\n/);
  const header = lines[0].split(',').map(s=>s.trim().replace(/^﻿/, ''));
  const ni = header.indexOf('name'), ei = header.indexOf('english_name'), di = header.indexOf('department_name');
  if (ni < 0){ App.toast('CSV 需要有 name 欄位','err'); return; }
  let ok = 0, skip = 0;
  for (const line of lines.slice(1)){
    const cols = line.split(',');
    const name = (cols[ni]||'').trim(); if (!name){ continue; }
    const dn = di>=0 ? (cols[di]||'').trim() : '';
    const dept = depts.find(d=>d.name===dn);
    const r = await App.adminApi('/api/admin/employees',{method:'POST',body:JSON.stringify({
      name, english_name: ei>=0?(cols[ei]||'').trim():'', department_ids: dept?[dept.id]:[], status:'active',
    })});
    r.ok ? ok++ : skip++;
  }
  App.toast(`匯入完成：成功 ${ok} 筆${skip?`，失敗 ${skip} 筆`:''}`, skip?'err':'ok');
  loadAll();
}

/* ── 部門管理 ── */
function renderDept(){
  const rows = depts.map((d,i)=>`
    <tr class="deptrow" data-id="${esc(d.id)}">
      <td class="ord"><span class="grip" title="拖曳調整順序">⋮⋮</span><span class="ordn">${i+1}</span></td>
      <td><b>${esc(d.name)}</b></td>
      <td><span class="tag blue">${d.member_count??0} 人</span></td>
      <td class="acts"><button class="iconbtn" data-dedit="${esc(d.id)}" title="編輯" aria-label="編輯">✏️</button><button class="iconbtn del" data-ddel="${esc(d.id)}" title="刪除" aria-label="刪除">🗑️</button></td>
    </tr>`).join('');
  document.getElementById('panel').innerHTML = `
    <div class="card">
      <div class="row emphead" style="justify-content:space-between;margin-bottom:10px;">
        <b>部門列表 <span class="muted">（${depts.length}）</span></b>
        <button class="btn primary" id="addD"><span class="full">＋ 新增部門</span><span class="short">＋</span></button>
      </div>
      <div class="table-wrap"><table class="data">
        <thead><tr><th>順序</th><th>部門名稱</th><th>員工人數</th><th></th></tr></thead>
        <tbody id="deptBody">${rows||'<tr><td colspan="4" class="empty">尚無部門</td></tr>'}</tbody>
      </table></div>
      <div class="muted" style="font-size:14px;margin-top:8px;">拖曳左側握把 ⋮⋮ 即可調整部門順序，放開後自動儲存。</div>
    </div>`;
  document.getElementById('addD').onclick = ()=>deptForm();
  document.querySelectorAll('[data-dedit]').forEach(b=>b.onclick=()=>deptForm(depts.find(x=>x.id===b.dataset.dedit)));
  document.querySelectorAll('[data-ddel]').forEach(b=>b.onclick=()=>delDept(b.dataset.ddel));
  attachDeptDrag();
}

// 拖曳排序（pointer 事件，滑鼠與觸控通用）：放開後依新順序重設 sort_order
function attachDeptDrag(){
  const tbody = document.getElementById('deptBody');
  if (!tbody) return;
  const rowsOf = ()=>[...tbody.querySelectorAll('tr.deptrow')];
  tbody.querySelectorAll('.grip').forEach(grip=>{
    grip.onpointerdown = (e)=>{
      e.preventDefault();
      const tr = grip.closest('tr.deptrow');
      tr.classList.add('dragging');
      const move = (ev)=>{
        const y = ev.clientY;
        for (const r of rowsOf()){
          if (r===tr) continue;
          const rect = r.getBoundingClientRect();
          if (y >= rect.top && y <= rect.bottom){
            tbody.insertBefore(tr, (y > rect.top + rect.height/2) ? r.nextSibling : r);
            break;
          }
        }
      };
      const up = async ()=>{
        document.removeEventListener('pointermove', move);
        document.removeEventListener('pointerup', up);
        tr.classList.remove('dragging');
        const ids = rowsOf().map(r=>r.dataset.id);
        if (ids.join(',') !== depts.map(d=>d.id).join(',')) await persistDeptOrder(ids);
      };
      document.addEventListener('pointermove', move);
      document.addEventListener('pointerup', up);
    };
  });
}
async function persistDeptOrder(ids){
  const byId = Object.fromEntries(depts.map(d=>[d.id,d]));
  depts = ids.map((id,i)=>{ const d = byId[id]; d.sort_order = (i+1)*10; return d; });
  renderDept(); // 立即反映新順序與編號
  const res = await Promise.all(depts.map(d=>App.adminApi(`/api/admin/departments/${d.id}`,{method:'PUT',body:JSON.stringify({sort_order:d.sort_order})})));
  if (res.every(r=>r.ok)) App.toast('部門順序已更新','ok');
  else { App.toast('部分順序儲存失敗','err'); loadAll(); }
}
function deptForm(d){
  const cur = d || { name:'', sort_order:(depts.length+1)*10 };
  modal(`${d?'編輯':'新增'}部門`, `
    <div class="field"><label>部門名稱</label><input id="d_name" value="${esc(cur.name)}" /></div>
    <div class="muted" style="font-size:14px;">新增後可在列表用拖曳調整順序。</div>
  `, async ()=>{
    const name = document.getElementById('d_name').value.trim();
    if (!name){ App.toast('請輸入名稱','err'); return false; }
    const body = { name, sort_order: cur.sort_order??0 };
    const res = d ? await App.adminApi(`/api/admin/departments/${d.id}`,{method:'PUT',body:JSON.stringify(body)})
                  : await App.adminApi('/api/admin/departments',{method:'POST',body:JSON.stringify(body)});
    if (!res.ok){ App.toast('儲存失敗','err'); return false; }
    App.toast(d?'已更新部門':'已新增部門','ok');
    await loadAll(); return true;
  });
}
async function delDept(id){
  const d = depts.find(x=>x.id===id);
  if (!await App.confirm(`確定刪除部門「${d?d.name:''}」？（員工不會被刪，但會失去此部門歸屬）`, { title:'刪除部門', okText:'刪除', danger:true })) return;
  const res = await App.adminApi(`/api/admin/departments/${id}`,{method:'DELETE'});
  if (!res.ok){ App.toast('刪除失敗','err'); return; }
  App.toast('已刪除','ok');
  loadAll();
}

/* ── 共用 modal ── */
function modal(title, inner, onSave){
  const wrap = document.createElement('div');
  wrap.className = 'modal-scrim';
  wrap.innerHTML = `<div class="modal"><h3>${esc(title)}</h3>${inner}
    <div class="actions"><button class="btn" id="m_cancel">取消</button><button class="btn primary" id="m_save">儲存</button></div></div>`;
  document.body.appendChild(wrap);
  const close = ()=>wrap.remove();
  wrap.querySelector('#m_cancel').onclick = close;
  wrap.onclick = (ev)=>{ if(ev.target===wrap) close(); };
  wrap.querySelector('#m_save').onclick = async ()=>{ const ok = await onSave(); if (ok!==false) close(); };
}

document.getElementById('tabEmp').onclick = ()=>{ tab='emp'; document.getElementById('tabEmp').classList.add('active'); document.getElementById('tabDept').classList.remove('active'); render(); };
document.getElementById('tabDept').onclick = ()=>{ tab='dept'; document.getElementById('tabDept').classList.add('active'); document.getElementById('tabEmp').classList.remove('active'); render(); };
loadAll();
</script>
