<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DPC 同步 · 開發處休假表</title>
<link rel="stylesheet" href="app.css" />
<style>
  /* 頁面專用；其餘吃共用 app.css */
  .app-main{ max-width:640px; }
  .status-line{ font-size:13px; }
  .kv{ display:grid; grid-template-columns:auto 1fr; gap:4px 12px; font-size:13px; margin-top:8px; }
  .kv .k{ color:var(--muted); }
  pre{ background:#f3f4f6; border-radius:8px; padding:10px; font-size:12px; overflow:auto; }
</style>
</head>
<body class="has-shell">
<main class="app-main">
  <div class="page-head"><h1>DPC 同步</h1><div class="sub">每天早上 8 點自動同步;也可在此手動立即同步。</div></div>

  <div class="card">
    <h2>DPC 同步</h2>
    <div id="statusBox" class="muted" style="margin-top:8px;">讀取同步狀態中…</div>

    <div class="field" style="margin-top:12px;">
      <label>同步密語(SYNC_SECRET,會記在本機瀏覽器)</label>
      <input id="secret" type="password" placeholder="輸入密語…" />
    </div>
    <div class="row" style="margin-top:14px;">
      <button class="btn primary" id="syncBtn">立即同步</button>
      <span id="result" class="status-line"></span>
    </div>
    <div class="muted" style="margin-top:10px;">只同步 DPC 的人員與休假;<b>假別與假日不同步</b>,請於「休假設定」頁維護。</div>
  </div>
</main>

<script src="app.js"></script>
<script>
const API_BASE = (new URLSearchParams(location.search).get('api')
  || 'https://workforcemanagement.ellyfd.workers.dev').replace(/\/+$/, '');
let secret = localStorage.getItem('dev_sync_secret') || '';
const $ = (id) => document.getElementById(id);
$('secret').value = secret;

function fmtTime(ts){ return ts ? new Date(Number(ts)).toLocaleString('zh-TW') : '—'; }

async function loadStatus(){
  try {
    const r = await fetch(`${API_BASE}/api/sync/status`, { cache:'no-store' });
    const s = await r.json();
    const box = $('statusBox');
    if (s.never){
      box.innerHTML = '<span class="muted">尚未同步過。</span>';
      return;
    }
    const okTxt = s.ok ? '<span class="ok">成功</span>' : `<span class="err">失敗</span>`;
    box.innerHTML = `
      <div class="kv">
        <span class="k">上次同步</span><span>${fmtTime(s.updated_at)}　${okTxt}</span>
        ${s.ok ? `<span class="k">部門</span><span>${s.department||'DPC'}</span>
        <span class="k">員工 / 休假</span><span>${s.employees ?? '—'} 人 / ${s.leave_records ?? '—'} 筆</span>`
        : `<span class="k">錯誤</span><span class="err">${s.error||''}</span>`}
      </div>`;
  } catch (e) {
    $('statusBox').innerHTML = `<span class="err">讀取狀態失敗:${e.message}</span>`;
  }
}

$('syncBtn').onclick = async () => {
  secret = $('secret').value.trim();
  localStorage.setItem('dev_sync_secret', secret);
  const btn = $('syncBtn'), res = $('result');
  btn.disabled = true; res.textContent = '同步中…'; res.className = 'status-line muted';
  try {
    const r = await fetch(`${API_BASE}/api/sync`, {
      method: 'POST',
      headers: secret ? { 'X-Sync-Secret': secret } : {},
    });
    const s = await r.json();
    if (r.status === 401){ res.textContent = '密語錯誤'; res.className = 'status-line err'; }
    else if (s.ok){ res.textContent = `完成:${s.employees} 人、${s.leave_records} 筆休假`; res.className = 'status-line ok'; }
    else { res.textContent = `失敗:${s.error||'未知錯誤'}`; res.className = 'status-line err'; }
  } catch (e) {
    res.textContent = `失敗:${e.message}`; res.className = 'status-line err';
  } finally {
    btn.disabled = false;
    loadStatus();
  }
};

loadStatus();
</script>
</body>
</html>
